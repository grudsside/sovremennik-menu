name: Temporary Edge auth formatter

on:
  push:
    branches:
      - security/require-active-profiles-edge-functions

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: security/require-active-profiles-edge-functions

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Format target files
        run: |
          deno fmt \
            supabase/functions/_shared/auth.ts \
            supabase/functions/_shared/auth.test.ts \
            supabase/functions/_shared/push.ts \
            supabase/functions/push-send/index.ts \
            supabase/functions/notify-event/index.ts

      - name: Commit formatted files and remove workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/format-edge-auth.yml
          git add \
            supabase/functions/_shared/auth.ts \
            supabase/functions/_shared/auth.test.ts \
            supabase/functions/_shared/push.ts \
            supabase/functions/push-send/index.ts \
            supabase/functions/notify-event/index.ts
          git commit -m "Format Edge authentication files"
          git push
