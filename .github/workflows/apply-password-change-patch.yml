name: Apply reviewed password change patch

on:
  push:
    branches:
      - security/password-change

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply reviewed patch
        shell: bash
        run: |
          set -euo pipefail
          test -f password-change.patch
          git apply --check password-change.patch
          git apply password-change.patch
          node --check assets/js/app.js
          git diff --check

      - name: Remove temporary installer files
        shell: bash
        run: |
          rm password-change.patch
          rm .github/workflows/apply-password-change-patch.yml

      - name: Commit applied change
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/js/app.js password-change.patch .github/workflows/apply-password-change-patch.yml
          git commit -m "Add secure self-service password change"
          git push origin HEAD:security/password-change
