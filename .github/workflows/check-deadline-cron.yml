name: Format and verify deadline cron authentication

on:
  push:
    branches:
      - security/deadline-cron-fail-closed

permissions:
  contents: write

jobs:
  deno-checks:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: security/deadline-cron-fail-closed
          fetch-depth: 0
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Format
        run: deno fmt supabase/functions/deadline-checker/
      - name: Unit tests
        run: deno test supabase/functions/deadline-checker/cron-auth.test.ts
      - name: Type check
        run: deno check supabase/functions/deadline-checker/index.ts
      - name: Diff check
        run: git diff --check
      - name: Record successful verification
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add supabase/functions/deadline-checker/
          git commit --allow-empty -m "Format and verify deadline cron authentication"
          git push
