name: Capture final deadline cron type-check output

on:
  push:
    branches:
      - security/deadline-cron-fail-closed

permissions:
  contents: write

jobs:
  deno-checks:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: security/deadline-cron-fail-closed
          fetch-depth: 0
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Capture verification output
        shell: bash
        run: |
          set +e
          deno fmt --check supabase/functions/deadline-checker/ > .github/deadline-cron-fmt.log 2>&1
          fmt_status=$?
          deno test supabase/functions/deadline-checker/cron-auth.test.ts > .github/deadline-cron-test.log 2>&1
          test_status=$?
          deno check --node-modules-dir=auto supabase/functions/deadline-checker/index.ts > .github/deadline-cron-check.log 2>&1
          check_status=$?
          git diff --check > .github/deadline-cron-diff.log 2>&1
          diff_status=$?
          {
            echo "fmt=$fmt_status"
            echo "test=$test_status"
            echo "check=$check_status"
            echo "diff=$diff_status"
          } > .github/deadline-cron-verification.txt
      - name: Commit diagnostic output
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/deadline-cron-*.log .github/deadline-cron-verification.txt
          git commit -m "Record final deadline cron verification output"
          git push
