name: Diagnose deadline cron verification

on:
  push:
    branches:
      - security/deadline-cron-fail-closed

permissions:
  contents: write

jobs:
  deno-checks:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: security/deadline-cron-fail-closed
          fetch-depth: 0
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Format and collect status codes
        shell: bash
        run: |
          set +e
          deno fmt supabase/functions/deadline-checker/
          fmt_status=$?
          deno test supabase/functions/deadline-checker/cron-auth.test.ts
          test_status=$?
          deno check supabase/functions/deadline-checker/index.ts
          check_status=$?
          git diff --check
          diff_status=$?
          mkdir -p .github
          {
            echo "fmt=$fmt_status"
            echo "test=$test_status"
            echo "check=$check_status"
            echo "diff=$diff_status"
          } > .github/deadline-cron-verification.txt
      - name: Commit diagnostic result
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add supabase/functions/deadline-checker/ .github/deadline-cron-verification.txt
          git commit -m "Record deadline cron verification status"
          git push
