name: Capture deadline cron type-check error

on:
  push:
    branches:
      - security/deadline-cron-fail-closed

permissions:
  contents: write

jobs:
  deno-checks:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: security/deadline-cron-fail-closed
          fetch-depth: 0
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Capture type-check output
        shell: bash
        run: |
          set +e
          deno check supabase/functions/deadline-checker/index.ts > .github/deadline-cron-check.log 2>&1
          status=$?
          echo "exit=$status" >> .github/deadline-cron-check.log
      - name: Commit diagnostic log
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/deadline-cron-check.log
          git commit -m "Record deadline cron type-check error"
          git push
