name: Verify deadline cron authentication

on:
  push:
    branches:
      - security/deadline-cron-fail-closed

permissions:
  contents: write

jobs:
  deno-checks:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: security/deadline-cron-fail-closed
          fetch-depth: 0
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Verify
        shell: bash
        run: |
          deno fmt --check supabase/functions/deadline-checker/
          deno test supabase/functions/deadline-checker/cron-auth.test.ts
          deno check --node-modules-dir=auto supabase/functions/deadline-checker/index.ts
          git diff --check
          {
            echo "fmt=0"
            echo "test=0"
            echo "check=0"
            echo "diff=0"
          } > .github/deadline-cron-verification.txt
          rm -f .github/deadline-cron-check.log
      - name: Record successful verification
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add supabase/functions/deadline-checker/ .github/deadline-cron-verification.txt .github/deadline-cron-check.log
          git commit -m "Verify deadline cron authentication"
          git push
