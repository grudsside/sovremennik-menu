name: Production migration diagnostic

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/production-migration-diagnostic.yml'
      - 'tools/production-admin-controls-release-diagnostic.mjs'
      - 'tools/production-admin-controls-release.mjs'
      - 'supabase/migrations/20260720193000_section_maintenance.sql'
      - 'supabase/migrations/20260721183000_coffee_revision_admin_correction.sql'
      - 'supabase/migrations/20260721190000_coffee_revision_formula_corrections.sql'
      - 'supabase/migrations/20260721203000_coffee_revision_total_stock.sql'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: production-migration-diagnostic
  cancel-in-progress: false

jobs:
  diagnose:
    name: Capture production migration result
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PRODUCTION_PROJECT_REF: tjibbzfdughhjenumzxo

    steps:
      - name: Checkout release source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run migration diagnostic
        id: diagnostic
        continue-on-error: true
        run: node tools/production-admin-controls-release-diagnostic.mjs

      - name: Publish diagnostic commit status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          DIAGNOSTIC_OUTCOME: ${{ steps.diagnostic.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$DIAGNOSTIC_OUTCOME" == 'success' ]]; then
            state='success'
            description='Production migrations and verification passed'
          else
            state='failure'
            if [[ -f artifacts/production-release/failure-summary.txt ]]; then
              description="$(tr '\n' ' ' < artifacts/production-release/failure-summary.txt | cut -c1-135)"
            else
              description='Production migration diagnostic failed'
            fi
          fi

          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --raw-field state="$state" \
            --raw-field context='production/migration-diagnostic' \
            --raw-field description="$description" \
            --raw-field target_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Upload diagnostic report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-migration-diagnostic
          path: artifacts/production-release
          if-no-files-found: error
          retention-days: 7

      - name: Fail job when diagnostic failed
        if: steps.diagnostic.outcome != 'success'
        run: exit 1