name: Production admin controls release

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/production-admin-controls-release.yml'
      - 'tools/production-admin-controls-release.mjs'
      - 'supabase/migrations/20260720193000_section_maintenance.sql'
      - 'supabase/migrations/20260721183000_coffee_revision_admin_correction.sql'
      - 'supabase/migrations/20260721190000_coffee_revision_formula_corrections.sql'
      - 'supabase/migrations/20260721203000_coffee_revision_total_stock.sql'
      - 'supabase/migrations/20260721223000_coffee_revision_integrity_summary.sql'
      - 'assets/js/coffee-revision-editor.js'
      - 'assets/js/coffee-revision-formula-core.js'
      - 'assets/js/coffee-revision-formula-fix.js'
      - 'assets/js/coffee-revision-summary-core.js'
      - 'assets/js/coffee-revision-integrity-fix.js'
      - 'assets/css/coffee-revision-editor.css'
      - 'assets/js/supabase-config.js'
      - 'supabase/functions/admin-employees/**'
      - 'supabase/functions/admin-maintenance/**'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  statuses: write

concurrency:
  group: production-admin-controls-release
  cancel-in-progress: false

jobs:
  deploy-production:
    name: Deploy and verify production release
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PRODUCTION_PROJECT_REF: tjibbzfdughhjenumzxo
      PRODUCTION_SUPABASE_URL: https://tjibbzfdughhjenumzxo.supabase.co
      PRODUCTION_PAGES_URL: https://grudsside.github.io/sovremennik-menu

    steps:
      - name: Checkout release source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate production target and credentials
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "$SUPABASE_ACCESS_TOKEN" ]] || { echo 'SUPABASE_ACCESS_TOKEN is missing.' >&2; exit 1; }
          [[ "$PRODUCTION_PROJECT_REF" == 'tjibbzfdughhjenumzxo' ]] || { echo 'Unexpected production Project Ref.' >&2; exit 1; }
          [[ "$PRODUCTION_SUPABASE_URL" == "https://${PRODUCTION_PROJECT_REF}.supabase.co" ]] || { echo 'Production URL and Project Ref do not match.' >&2; exit 1; }
          [[ "$PRODUCTION_PAGES_URL" == 'https://grudsside.github.io/sovremennik-menu' ]] || { echo 'Unexpected GitHub Pages URL.' >&2; exit 1; }

      - name: Apply and verify production migrations
        run: node tools/production-admin-controls-release.mjs

      - name: Deploy protected production Edge Functions
        shell: bash
        run: |
          set -euo pipefail
          [[ "$PRODUCTION_PROJECT_REF" == 'tjibbzfdughhjenumzxo' ]] || exit 1
          supabase functions deploy admin-employees \
            --project-ref "$PRODUCTION_PROJECT_REF" \
            --use-api
          supabase functions deploy admin-maintenance \
            --project-ref "$PRODUCTION_PROJECT_REF" \
            --use-api

      - name: Verify production function authentication gates
        shell: bash
        run: |
          set -euo pipefail
          for function_name in admin-employees admin-maintenance; do
            verified=false
            for attempt in {1..10}; do
              status="$(curl --silent --show-error \
                --output "/tmp/${function_name}.txt" \
                --write-out '%{http_code}' \
                --request POST \
                --header 'Content-Type: application/json' \
                --data '{}' \
                "${PRODUCTION_SUPABASE_URL}/functions/v1/${function_name}")"
              if [[ "$status" == '401' || "$status" == '403' ]]; then
                verified=true
                break
              fi
              sleep 3
            done
            [[ "$verified" == 'true' ]] || {
              echo "${function_name} did not enforce authentication after deployment." >&2
              cat "/tmp/${function_name}.txt" >&2 || true
              exit 1
            }
          done

      - name: Verify published GitHub Pages frontend
        shell: bash
        run: |
          set -euo pipefail
          published=false
          for attempt in {1..60}; do
            html="$(curl --fail --silent --show-error \
              "${PRODUCTION_PAGES_URL}/?release=${GITHUB_SHA}" || true)"
            loader="$(curl --fail --silent --show-error \
              "${PRODUCTION_PAGES_URL}/assets/js/push.js?release=${GITHUB_SHA}" || true)"
            config="$(curl --fail --silent --show-error \
              "${PRODUCTION_PAGES_URL}/assets/js/supabase-config.js?release=${GITHUB_SHA}" || true)"
            revision_editor="$(curl --fail --silent --show-error \
              "${PRODUCTION_PAGES_URL}/assets/js/coffee-revision-editor.js?release=${GITHUB_SHA}" || true)"
            revision_formula="$(curl --fail --silent --show-error \
              "${PRODUCTION_PAGES_URL}/assets/js/coffee-revision-formula-fix.js?release=${GITHUB_SHA}" || true)"
            revision_summary="$(curl --fail --silent --show-error \
              "${PRODUCTION_PAGES_URL}/assets/js/coffee-revision-summary-core.js?release=${GITHUB_SHA}" || true)"
            revision_integrity="$(curl --fail --silent --show-error \
              "${PRODUCTION_PAGES_URL}/assets/js/coffee-revision-integrity-fix.js?release=${GITHUB_SHA}" || true)"
            revision_styles="$(curl --fail --silent --show-error \
              "${PRODUCTION_PAGES_URL}/assets/css/coffee-revision-editor.css?release=${GITHUB_SHA}" || true)"

            if grep -q 'assets/js/push.js' <<< "$html" \
              && grep -q 'section-maintenance.js' <<< "$loader" \
              && grep -q 'mobile-photo-expand.js' <<< "$loader" \
              && grep -q 'tjibbzfdughhjenumzxo' <<< "$config" \
              && grep -q '20260721-5' <<< "$config" \
              && grep -q 'coffee-revision-editor.js' <<< "$config" \
              && grep -q 'coffee-revision-summary-core.js' <<< "$config" \
              && grep -q 'coffee-revision-integrity-fix.js' <<< "$config" \
              && grep -q 'name="grainDelivery"' <<< "$revision_editor" \
              && grep -q 'name="stockBalanceOverride"' <<< "$revision_editor" \
              && grep -q 'Общий остаток зерна' <<< "$revision_formula" \
              && grep -q 'calculatePeriodSummary' <<< "$revision_summary" \
              && grep -q 'Повторная отправка заблокирована' <<< "$revision_integrity" \
              && grep -q 'Потери от продаж 7 дн.' <<< "$revision_integrity" \
              && grep -q 'grid-template-columns: repeat(12' <<< "$revision_styles" \
              && grep -q 'height: 48px' <<< "$revision_styles" \
              && ! grep -q 'enkftanmqlwvjydliwue' <<< "$config"; then
              published=true
              break
            fi
            sleep 10
          done

          [[ "$published" == 'true' ]] || {
            echo 'GitHub Pages did not publish the expected production frontend in time.' >&2
            exit 1
          }

          for asset in \
            assets/js/section-maintenance.js \
            assets/css/section-maintenance.css \
            assets/js/mobile-photo-expand.js \
            assets/css/mobile-photo-expand.css \
            assets/js/coffee-revision-editor.js \
            assets/js/coffee-revision-formula-core.js \
            assets/js/coffee-revision-formula-fix.js \
            assets/js/coffee-revision-summary-core.js \
            assets/js/coffee-revision-integrity-fix.js \
            assets/css/coffee-revision-editor.css; do
            curl --fail --silent --show-error \
              "${PRODUCTION_PAGES_URL}/${asset}?release=${GITHUB_SHA}" \
              --output /dev/null
          done

      - name: Publish release summary
        if: success()
        shell: bash
        run: |
          {
            echo '## Production release verified'
            echo
            echo '- Maintenance and coffee revision migrations applied and verified.'
            echo '- Confirmed values for 13–15 July restored with audit history.'
            echo '- Duplicate revision dates can no longer overwrite operational values.'
            echo '- Administrator revision correction, audit history and role restrictions are active.'
            echo '- Coffee loss formulas, opening anchors, deliveries and rolling total grain stock are verified.'
            echo '- Revision summary uses period totals instead of averaging daily percentages.'
            echo '- `admin-employees` and `admin-maintenance` remain protected by JWT verification.'
            echo '- GitHub Pages serves the new revision assets and production configuration.'
            echo '- Frontend configuration points to production, not preview.'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish machine-readable production status
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_STATUS: ${{ job.status }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$RELEASE_STATUS" == 'success' ]]; then
            state='success'
            description='Production deployment and verification passed'
          else
            state='failure'
            description='Production deployment or verification failed'
          fi

          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --raw-field state="$state" \
            --raw-field context='production/admin-controls' \
            --raw-field description="$description" \
            --raw-field target_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Publish permanent release receipt
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_STATUS: ${{ job.status }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$RELEASE_STATUS" == 'success' ]]; then
            heading='✅ Production release verified'
            details='Coffee revision source data, duplicate protection, weighted summary, formulas, rolling stock, Edge Function gates and GitHub Pages frontend all passed.'
          else
            heading='❌ Production release requires attention'
            details='At least one production deployment or verification step failed. Review the linked workflow run before using the new revision controls.'
          fi

          {
            printf '%s\n\n' "$heading"
            printf '%s\n\n' "$details"
            printf -- '- Commit: `%s`\n' "$GITHUB_SHA"
            printf -- '- Workflow: https://github.com/%s/actions/runs/%s\n' "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID"
            printf -- '- Production app: https://grudsside.github.io/sovremennik-menu/\n'
            printf -- '- Production Supabase Ref: `tjibbzfdughhjenumzxo`\n'
            printf -- '- Preview project was not used.\n'
          } > /tmp/production-release-comment.md

          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/issues/33/comments" \
            --raw-field body="$(cat /tmp/production-release-comment.md)"

      - name: Upload production release report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-admin-controls-release
          path: artifacts/production-release
          if-no-files-found: warn
          retention-days: 30
