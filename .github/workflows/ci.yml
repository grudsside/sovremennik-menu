name: Repository checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    name: checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check JavaScript syntax
        run: |
          node --check assets/js/app.js
          node --check assets/js/push.js
          node --check assets/js/push-legacy.js
          node --check assets/js/employee-status.js
          node --check assets/js/interface-redesign.js
          node --check assets/js/tasks-v2.js
          node --check assets/js/interface-v3.js
          node --check assets/js/greeting-name.js
          node --check assets/js/schedule-manager.js
          node --check assets/js/schedule-submit-fix.js
          node --check assets/js/schedule-departments.js
          node --check assets/js/interface-followup.js
          node --check assets/js/home-shift-roles.js
          node --check assets/js/mobile-active-panel.js
          node --check assets/js/section-maintenance.js
          node --check assets/js/mobile-photo-expand.js
          node --check assets/js/checklist-details-fix.js
          node --check assets/js/checklist-photo-core.js
          node --check assets/js/checklist-photo-reports.js
          node --check assets/js/offline-core.js
          node --check assets/js/offline-sync.js
          node --check assets/js/shift-handoff-core.js
          node --check assets/js/shift-handoff.js
          node --check assets/js/notification-history-core.js
          node --check assets/js/notifications.js
          node --check service-worker.js

      - name: Check repository structure, JSON and secrets
        run: node tools/repo-check.mjs

      - name: Check task workflow regressions
        run: node tools/task-regression-check.mjs

      - name: Check isolated tasks v2 module
        run: node tools/tasks-v2-module-check.mjs

      - name: Check interface observer loop
        run: node tools/interface-observer-check.mjs

      - name: Check interface follow-up regressions
        run: node tools/interface-followup-check.mjs

      - name: Check checklist details regression
        run: node tools/checklist-details-check.mjs

      - name: Check checklist photo-report core
        run: |
          node tests/checklist-photo-core.test.js
          node tools/checklist-photo-interface-check.mjs

      - name: Check offline reliability core
        run: |
          node tests/offline-core.test.js
          node tools/offline-interface-check.mjs

      - name: Check shift handoff
        run: |
          node tests/shift-handoff-core.test.js
          node tools/shift-handoff-interface-check.mjs

      - name: Check schedule manager regressions
        run: node tools/schedule-manager-check.mjs

      - name: Check schedule department regressions
        run: node tools/schedule-departments-check.mjs

      - name: Check iPhone task form regressions
        run: node tools/iphone-task-form-check.mjs

      - name: Check tasks release mode
        run: node tools/tasks-release-mode-check.mjs

      - name: Check RLS migration structure
        run: node tools/rls-migration-check.mjs

      - name: Check coffee revision correction
        run: node tools/coffee-revision-correction-check.mjs

      - name: Check coffee revision duplicate protection and summary
        run: node tools/coffee-revision-integrity-check.mjs

      - name: Check employee activation and role controls
        run: node tools/employee-role-controls-check.mjs

      - name: Check open-test admin controls
        run: node tools/open-test-admin-controls-check.mjs

      - name: Check live preview deployment safety
        run: node tools/live-preview-check.mjs

      - name: Check production release deployment safety
        run: node tools/production-release-check.mjs

      - name: Check checklist photo production rollout safety
        run: node tools/checklist-photo-production-rollout-check.mjs

      - name: Check notification history
        run: |
          node tests/notification-history-core.test.js
          node tools/notification-history-interface-check.mjs

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check deadline-checker formatting
        run: deno fmt --check supabase/functions/deadline-checker/index.ts

      - name: Test deadline cron authentication
        run: deno test supabase/functions/deadline-checker/index.test.ts

      - name: Type-check deadline-checker
        run: deno check supabase/functions/deadline-checker/index.ts

      - name: Test checklist photo retention authorization
        run: deno test supabase/functions/checklist-photo-retention/index.test.ts

      - name: Type-check checklist photo retention
        run: deno check supabase/functions/checklist-photo-retention/index.ts

      - name: Check authenticated Edge Function formatting
        run: deno fmt --check supabase/functions/_shared/require-active-profile.ts

      - name: Check admin Edge Function formatting
        run: deno fmt --check supabase/functions/_shared/require-admin.ts

      - name: Check preview site Edge Function
        run: |
          deno fmt --check supabase/functions/preview-site/index.ts
          deno check supabase/functions/preview-site/index.ts

      - name: Test active profile validation
        run: deno test supabase/functions/_shared/require-active-profile.test.ts

      - name: Test notify-event authorization
        run: deno test supabase/functions/notify-event/index.test.ts

      - name: Type-check push-send
        run: deno check supabase/functions/push-send/index.ts

      - name: Type-check notify-event
        run: deno check supabase/functions/notify-event/index.ts

      - name: Test admin employee authorization
        run: deno test supabase/functions/admin-employees/index.test.ts

      - name: Type-check admin-employees
        run: deno check supabase/functions/admin-employees/index.ts

      - name: Type-check admin-maintenance
        run: deno check supabase/functions/admin-maintenance/index.ts

  db-preview:
    name: Isolated database preview
    needs: checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: preview
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Apply and test full Free preview schema
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -U postgres -d preview -f tools/free-preview-db-smoke.sql
          psql -h 127.0.0.1 -U postgres -d preview -f supabase/migrations/20260723150000_shift_handoff_preview.sql
          psql -h 127.0.0.1 -U postgres -d preview -f supabase/migrations/20260723190000_shift_handoff_barista_only.sql
          psql -h 127.0.0.1 -U postgres -d preview -f tools/shift-handoff-db-smoke.sql

  preview-smoke:
    name: Isolated browser preview
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.54.1
          npx playwright install --with-deps chromium

      - name: Run existing desktop and mobile preview smoke tests
        run: node tools/open-test-browser-smoke.mjs

      - name: Run checklist photo report browser smoke test
        run: node tools/checklist-photo-browser-smoke.mjs

      - name: Run offline reliability browser smoke test
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/open-test-preview
          node tools/offline-reliability-browser-smoke-runner.mjs 2>&1 | tee artifacts/open-test-preview/offline-reliability.log

      - name: Run shift handoff mobile browser smoke test
        run: node tools/shift-handoff-browser-smoke.mjs

      - name: Upload preview screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: open-test-preview-screenshots
          path: artifacts/open-test-preview
          if-no-files-found: warn
          retention-days: 14
