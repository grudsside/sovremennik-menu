name: Repository checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: repository-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check JavaScript syntax
        shell: bash
        run: |
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(git ls-files -z '*.js' '*.mjs')

      - name: Check repository structure, JSON and secrets
        run: node tools/ci-check.mjs

      - name: Check task workflow regressions
        run: node tools/task-workflow-check.mjs

      - name: Check interface follow-up regressions
        run: node tools/interface-followup-check.mjs

      - name: Check iPhone task form regressions
        run: node tools/iphone-task-freeze-check.mjs

      - name: Check tasks maintenance mode
        run: node tools/tasks-maintenance-check.mjs

      - name: Check RLS migration structure
        run: node tools/rls-sql-check.mjs

      - name: Check employee activation controls
        run: node tools/employee-status-check.mjs

      - name: Check notification history
        run: |
          node tools/notification-history-check.mjs
          node tools/notification-history-race-check.mjs

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check deadline-checker formatting
        run: deno fmt --check supabase/functions/deadline-checker/

      - name: Test deadline cron authentication
        run: deno test supabase/functions/deadline-checker/cron-auth.test.ts

      - name: Type-check deadline-checker
        run: deno check --node-modules-dir=auto supabase/functions/deadline-checker/index.ts

      - name: Check authenticated Edge Function formatting
        run: deno fmt --check supabase/functions/_shared/ supabase/functions/push-send/ supabase/functions/notify-event/

      - name: Test active profile validation
        run: deno test supabase/functions/_shared/auth.test.ts

      - name: Test notify-event authorization
        run: deno test supabase/functions/notify-event/authorization.test.ts

      - name: Type-check push-send
        run: deno check --node-modules-dir=auto supabase/functions/push-send/index.ts

      - name: Type-check notify-event
        run: deno check --node-modules-dir=auto supabase/functions/notify-event/index.ts

      - name: Test admin employee authorization
        run: deno test supabase/functions/admin-employees/authorization.test.ts

      - name: Type-check admin-employees
        run: deno check --node-modules-dir=auto supabase/functions/admin-employees/index.ts
