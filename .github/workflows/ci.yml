name: Repository checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: repository-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check JavaScript syntax
        shell: bash
        run: |
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(git ls-files -z '*.js' '*.mjs')

      - name: Check repository structure, JSON and secrets
        run: node tools/ci-check.mjs

      - name: Check task workflow regressions
        run: node tools/task-workflow-check.mjs

      - name: Check isolated tasks v2 module
        run: |
          node tools/tasks-v2-check.mjs
          node tools/tasks-v2-integration-check.mjs

      - name: Check interface observer loop
        run: node tools/interface-observer-loop-check.mjs

      - name: Check interface follow-up regressions
        run: node tools/interface-followup-check.mjs

      - name: Check checklist details regression
        run: node tools/checklist-details-fix-check.mjs

      - name: Check checklist photo-report core
        run: node tools/checklist-photo-core-check.mjs

      - name: Check schedule manager regressions
        run: node tools/schedule-manager-check.mjs

      - name: Check schedule department regressions
        run: node tools/schedule-departments-check.mjs

      - name: Check iPhone task form regressions
        run: node tools/iphone-task-freeze-check.mjs

      - name: Check tasks release mode
        run: node tools/tasks-maintenance-check.mjs

      - name: Check RLS migration structure
        run: node tools/rls-sql-check.mjs

      - name: Check coffee revision correction
        run: node tools/coffee-revision-editor-check.mjs

      - name: Check coffee revision duplicate protection and summary
        run: node tools/coffee-revision-integrity-check.mjs

      - name: Check employee activation and role controls
        run: node tools/employee-status-check.mjs

      - name: Check open-test admin controls
        run: node tools/open-test-admin-controls-check.mjs

      - name: Check live preview deployment safety
        run: node tools/live-preview-workflow-check.mjs

      - name: Check production release deployment safety
        run: node tools/production-release-workflow-check.mjs

      - name: Check checklist photo production rollout safety
        run: node tools/production-checklist-photo-release-workflow-check.mjs

      - name: Check notification history
        run: |
          node tools/notification-history-check.mjs
          node tools/notification-history-race-check.mjs

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check deadline-checker formatting
        run: deno fmt --check supabase/functions/deadline-checker/

      - name: Test deadline cron authentication
        run: deno test supabase/functions/deadline-checker/cron-auth.test.ts

      - name: Type-check deadline-checker
        run: deno check --node-modules-dir=auto supabase/functions/deadline-checker/index.ts

      - name: Test checklist photo retention authorization
        run: deno test supabase/functions/checklist-photo-retention/authorization.test.ts

      - name: Type-check checklist photo retention
        run: deno check --node-modules-dir=auto supabase/functions/checklist-photo-retention/index.ts

      - name: Check authenticated Edge Function formatting
        run: deno fmt --check supabase/functions/_shared/ supabase/functions/push-send/ supabase/functions/notify-event/

      - name: Check admin Edge Function formatting
        run: deno fmt --check supabase/functions/admin-employees/index.ts supabase/functions/admin-maintenance/

      - name: Check preview site Edge Function
        run: |
          deno fmt --check supabase/functions/preview-site/
          deno test supabase/functions/preview-site/routing.test.ts
          deno check supabase/functions/preview-site/index.ts

      - name: Test active profile validation
        run: deno test supabase/functions/_shared/auth.test.ts

      - name: Test notify-event authorization
        run: deno test supabase/functions/notify-event/authorization.test.ts

      - name: Type-check push-send
        run: deno check --node-modules-dir=auto supabase/functions/push-send/index.ts

      - name: Type-check notify-event
        run: deno check --node-modules-dir=auto supabase/functions/notify-event/index.ts

      - name: Test admin employee authorization
        run: deno test supabase/functions/admin-employees/authorization.test.ts

      - name: Type-check admin-employees
        run: deno check --node-modules-dir=auto supabase/functions/admin-employees/index.ts

      - name: Type-check admin-maintenance
        run: deno check --node-modules-dir=auto supabase/functions/admin-maintenance/index.ts

  database-preview:
    name: Isolated database preview
    needs: checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: preview
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Apply and test full Free preview schema
        env:
          PGPASSWORD: postgres
        run: psql -h 127.0.0.1 -U postgres -d preview -f tools/free-preview-db-smoke.sql

  preview-smoke:
    name: Isolated browser preview
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.54.1
          npx playwright install --with-deps chromium

      - name: Run existing desktop and mobile preview smoke tests
        run: node tools/open-test-browser-smoke.mjs

      - name: Run checklist photo report browser smoke test
        run: node tools/checklist-photo-browser-smoke.mjs

      - name: Upload preview screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: open-test-preview-screenshots
          path: artifacts/open-test-preview
          if-no-files-found: warn
          retention-days: 14
