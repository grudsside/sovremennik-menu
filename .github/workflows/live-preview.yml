name: Supabase live preview

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    paths:
      - 'index.html'
      - 'assets/**'
      - 'data/**'
      - 'supabase/**'
      - 'tools/live-preview-*.mjs'
      - '.github/workflows/live-preview.yml'
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Optional Supabase preview branch name'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: supabase-live-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-configuration:
    name: Preview configuration
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.detect.outputs.configured }}
    steps:
      - name: Detect required secrets
        id: detect
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PREVIEW_TEST_PASSWORD: ${{ secrets.PREVIEW_TEST_PASSWORD }}
        shell: bash
        run: |
          if [[ -n "$SUPABASE_ACCESS_TOKEN" && -n "$PREVIEW_TEST_PASSWORD" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "Supabase preview credentials are configured." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Supabase live preview is prepared but not started"
              echo
              echo "Repository secrets \`SUPABASE_ACCESS_TOKEN\` and \`PREVIEW_TEST_PASSWORD\` are required."
              echo "No production database, Edge Function, Storage object, or GitHub Pages deployment was changed."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  deploy-preview:
    name: Deploy isolated Supabase preview
    needs: detect-configuration
    if: needs.detect-configuration.outputs.configured == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PREVIEW_TEST_PASSWORD: ${{ secrets.PREVIEW_TEST_PASSWORD }}
      PARENT_SUPABASE_PROJECT_REF: tjibbzfdughhjenumzxo
      REQUESTED_BRANCH_NAME: ${{ inputs.branch_name }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Checkout preview source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Resolve isolated branch name
        shell: bash
        run: |
          if [[ -n "$REQUESTED_BRANCH_NAME" ]]; then
            branch="$REQUESTED_BRANCH_NAME"
          elif [[ -n "$PR_NUMBER" ]]; then
            branch="preview-pr-$PR_NUMBER"
          else
            branch="preview-${GITHUB_REF_NAME}-${GITHUB_RUN_ID}"
          fi
          branch="$(printf '%s' "$branch" | tr '/_ ' '-' | tr -cd '[:alnum:]-' | cut -c1-48)"
          if [[ -z "$branch" || "$branch" == "main" || "$branch" == "production" ]]; then
            echo "Unsafe preview branch name." >&2
            exit 1
          fi
          echo "SUPABASE_PREVIEW_BRANCH=$branch" >> "$GITHUB_ENV"
          echo "Using isolated Supabase branch: \`$branch\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Create or reuse data-less Supabase branch
        shell: bash
        run: |
          set -euo pipefail
          if ! supabase --experimental branches get "$SUPABASE_PREVIEW_BRANCH" \
            --project-ref "$PARENT_SUPABASE_PROJECT_REF" -o env > branch.env 2>/dev/null; then
            supabase --experimental branches create "$SUPABASE_PREVIEW_BRANCH" \
              --project-ref "$PARENT_SUPABASE_PROJECT_REF"
          fi

          ready=false
          for attempt in $(seq 1 36); do
            if supabase --experimental branches get "$SUPABASE_PREVIEW_BRANCH" \
              --project-ref "$PARENT_SUPABASE_PROJECT_REF" -o env > branch.env 2>/dev/null; then
              if grep -Eq '^(SUPABASE_URL|API_URL)=' branch.env \
                && grep -Eq '^(POSTGRES_URL_NON_POOLING|POSTGRES_URL)=' branch.env; then
                ready=true
                break
              fi
            fi
            sleep 10
          done
          if [[ "$ready" != "true" ]]; then
            echo "Supabase preview branch did not become ready." >&2
            exit 1
          fi

      - name: Export branch credentials safely
        shell: bash
        run: |
          set -euo pipefail
          grep -E '^[A-Z0-9_]+=' branch.env > branch.clean.env
          set -a
          source branch.clean.env
          set +a

          preview_url="${SUPABASE_URL:-${API_URL:-}}"
          public_key="${SUPABASE_PUBLISHABLE_KEY:-${PUBLISHABLE_KEY:-${SUPABASE_ANON_KEY:-${ANON_KEY:-}}}}"
          secret_key="${SUPABASE_SECRET_KEY:-${SECRET_KEY:-${SUPABASE_SERVICE_ROLE_KEY:-${SERVICE_ROLE_KEY:-}}}}"
          database_url="${POSTGRES_URL_NON_POOLING:-${POSTGRES_URL:-}}"

          if [[ -z "$preview_url" || -z "$public_key" || -z "$secret_key" || -z "$database_url" ]]; then
            echo "Supabase branch credentials are incomplete." >&2
            exit 1
          fi

          branch_ref="${preview_url#https://}"
          branch_ref="${branch_ref%%.*}"
          if [[ -z "$branch_ref" || "$branch_ref" == "$PARENT_SUPABASE_PROJECT_REF" ]]; then
            echo "Refusing to deploy against the production project." >&2
            exit 1
          fi

          echo "::add-mask::$public_key"
          echo "::add-mask::$secret_key"
          echo "::add-mask::$database_url"
          echo "::add-mask::$PREVIEW_TEST_PASSWORD"

          {
            echo "PREVIEW_SUPABASE_URL=$preview_url"
            echo "PREVIEW_PUBLIC_KEY=$public_key"
            echo "PREVIEW_SECRET_KEY=$secret_key"
            echo "PREVIEW_DATABASE_URL=$database_url"
            echo "PREVIEW_BRANCH_PROJECT_REF=$branch_ref"
          } >> "$GITHUB_ENV"

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Apply maintenance migration to preview branch
        shell: bash
        run: |
          psql "$PREVIEW_DATABASE_URL" \
            -v ON_ERROR_STOP=1 \
            -f supabase/migrations/20260720193000_section_maintenance.sql

      - name: Deploy protected preview Edge Functions
        shell: bash
        run: |
          supabase functions deploy admin-employees \
            --project-ref "$PREVIEW_BRANCH_PROJECT_REF" \
            --use-api
          supabase functions deploy admin-maintenance \
            --project-ref "$PREVIEW_BRANCH_PROJECT_REF" \
            --use-api

      - name: Install preview test dependencies
        run: npm install --no-save @supabase/supabase-js@2

      - name: Seed preview accounts and publish frontend
        run: node tools/live-preview-deploy.mjs

      - name: Run authenticated live smoke test
        run: node tools/live-preview-smoke.mjs

      - name: Publish preview result
        if: always()
        shell: bash
        run: |
          if [[ -f artifacts/live-preview/summary.md ]]; then
            cat artifacts/live-preview/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload preview report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-preview-${{ github.event.pull_request.number || github.run_id }}
          path: artifacts/live-preview
          if-no-files-found: warn
          retention-days: 14
