<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" role="img" aria-label="Баланс вкуса кофе"><defs><style>.bg{fill:#fbfcf6}.card{fill:#fffef8;stroke:#d5dec7;stroke-width:2}.accent{fill:#5f6f45}.accent2{fill:#8aa36c}.soft{fill:#eef4e6}.line{stroke:#5f6f45;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;fill:none}.thin{stroke:#8aa36c;stroke-width:2;stroke-linecap:round;fill:none}.txt{font-family:Inter,Arial,sans-serif;font-size:22px;fill:#2f3328;font-weight:700}.small{font-size:16px;fill:#68725d;font-weight:700}.title{font-size:28px;font-weight:900;fill:#2f3328}.white{fill:#fffef8}</style></defs><rect class="bg" width="1100" height="520" rx="38"/><text class="title" x="55" y="58">Баланс вкуса: недоэкстракция → баланс → переэкстракция</text><g transform="translate(75 130)"><rect class="card" width="280" height="250" rx="30"/><circle cx="140" cy="82" r="48" fill="#e9d6b8"/><text class="txt" x="140" y="158" text-anchor="middle">Кисло</text><text class="small" x="140" y="190" text-anchor="middle">водянисто · резко</text><text class="small" x="140" y="220" text-anchor="middle">помол мельче</text></g><g transform="translate(410 130)"><rect class="card" width="280" height="250" rx="30"/><circle cx="140" cy="82" r="48" fill="#c8d8b4"/><text class="txt" x="140" y="158" text-anchor="middle">Баланс</text><text class="small" x="140" y="190" text-anchor="middle">сладость · тело</text><text class="small" x="140" y="220" text-anchor="middle">чистое послевкусие</text></g><g transform="translate(745 130)"><rect class="card" width="280" height="250" rx="30"/><circle cx="140" cy="82" r="48" fill="#c6b198"/><text class="txt" x="140" y="158" text-anchor="middle">Горько</text><text class="small" x="140" y="190" text-anchor="middle">сухо · тяжело</text><text class="small" x="140" y="220" text-anchor="middle">помол крупнее</text></g><path class="line" d="M190 430 H910"/><path class="line" d="M910 430 l-25 -16 M910 430 l-25 16"/><text class="small" x="550" y="470" text-anchor="middle">Чем дольше вода контактирует с кофе, тем сильнее экстракция</text></svg>