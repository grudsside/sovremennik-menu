<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" role="img" aria-label="Карта кофейных напитков"><defs><style>.bg{fill:#fbfcf6}.card{fill:#fffef8;stroke:#d5dec7;stroke-width:2}.accent{fill:#5f6f45}.accent2{fill:#8aa36c}.soft{fill:#eef4e6}.line{stroke:#5f6f45;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;fill:none}.thin{stroke:#8aa36c;stroke-width:2;stroke-linecap:round;fill:none}.txt{font-family:Inter,Arial,sans-serif;font-size:22px;fill:#2f3328;font-weight:700}.small{font-size:16px;fill:#68725d;font-weight:700}.title{font-size:28px;font-weight:900;fill:#2f3328}.white{fill:#fffef8}</style></defs><rect class="bg" width="1100" height="560" rx="38"/><text class="title" x="55" y="58">Карта кофейных напитков</text><g transform="translate(75 115)"><rect class="card" width="210" height="150" rx="26"/><text class="txt" x="105" y="55" text-anchor="middle">Эспрессо</text><text class="small" x="105" y="90" text-anchor="middle">основа меню</text><text class="small" x="105" y="118" text-anchor="middle">плотно · ярко</text></g><g transform="translate(325 115)"><rect class="card" width="210" height="150" rx="26"/><text class="txt" x="105" y="55" text-anchor="middle">Американо</text><text class="small" x="105" y="90" text-anchor="middle">эспрессо + вода</text><text class="small" x="105" y="118" text-anchor="middle">мягче и легче</text></g><g transform="translate(575 115)"><rect class="card" width="210" height="150" rx="26"/><text class="txt" x="105" y="55" text-anchor="middle">Капучино</text><text class="small" x="105" y="90" text-anchor="middle">кофе + молоко</text><text class="small" x="105" y="118" text-anchor="middle">баланс и пена</text></g><g transform="translate(825 115)"><rect class="card" width="210" height="150" rx="26"/><text class="txt" x="105" y="55" text-anchor="middle">Латте</text><text class="small" x="105" y="90" text-anchor="middle">больше молока</text><text class="small" x="105" y="118" text-anchor="middle">мягкий вкус</text></g><g transform="translate(200 330)"><rect class="card" width="280" height="150" rx="26"/><text class="txt" x="140" y="55" text-anchor="middle">Флэт уайт</text><text class="small" x="140" y="90" text-anchor="middle">кофе выражен сильнее</text><text class="small" x="140" y="118" text-anchor="middle">тонкая молочная текстура</text></g><g transform="translate(620 330)"><rect class="card" width="280" height="150" rx="26"/><text class="txt" x="140" y="55" text-anchor="middle">Раф</text><text class="small" x="140" y="90" text-anchor="middle">эспрессо + сливки</text><text class="small" x="140" y="118" text-anchor="middle">десертный профиль</text></g><path class="thin" d="M285 190 H325 M535 190 H575 M785 190 H825 M180 265 L340 330 M895 265 L760 330"/></svg>