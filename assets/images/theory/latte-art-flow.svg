<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" role="img" aria-label="Этапы вливания молока"><defs><style>.bg{fill:#fbfcf6}.card{fill:#fffef8;stroke:#d5dec7;stroke-width:2}.accent{fill:#5f6f45}.accent2{fill:#8aa36c}.soft{fill:#eef4e6}.line{stroke:#5f6f45;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;fill:none}.thin{stroke:#8aa36c;stroke-width:2;stroke-linecap:round;fill:none}.txt{font-family:Inter,Arial,sans-serif;font-size:22px;fill:#2f3328;font-weight:700}.small{font-size:16px;fill:#68725d;font-weight:700}.title{font-size:28px;font-weight:900;fill:#2f3328}.white{fill:#fffef8}</style></defs><rect class="bg" width="1100" height="520" rx="38"/><text class="title" x="55" y="58">Вливание молока: от основы к рисунку</text><g transform="translate(70 130)"><rect class="card" width="280" height="260" rx="30"/><text class="txt" x="140" y="58" text-anchor="middle">Начало</text><path class="thin" d="M140 85 v70"/><path class="line" d="M92 175 q48 35 96 0"/><text class="small" x="140" y="222" text-anchor="middle">тонкая струя</text><text class="small" x="140" y="248" text-anchor="middle">с высоты 3–5 см</text></g><g transform="translate(410 130)"><rect class="card" width="280" height="260" rx="30"/><text class="txt" x="140" y="58" text-anchor="middle">Рисунок</text><path class="thin" d="M140 105 v35"/><path class="line" d="M92 175 q48 35 96 0"/><path class="accent2" d="M140 137 c40 5 46 50 0 64 c-46 -14 -40 -59 0 -64"/><text class="small" x="140" y="235" text-anchor="middle">питчер ниже</text></g><g transform="translate(750 130)"><rect class="card" width="280" height="260" rx="30"/><text class="txt" x="140" y="58" text-anchor="middle">Срез</text><path class="thin" d="M75 148 h130"/><path class="line" d="M92 175 q48 35 96 0"/><path class="accent2" d="M140 127 c42 7 50 58 0 78 c-50 -20 -42 -71 0 -78"/><text class="small" x="140" y="235" text-anchor="middle">ровное движение</text></g></svg>