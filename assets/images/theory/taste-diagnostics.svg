<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" role="img" aria-label="Диагностика вкуса эспрессо"><defs><style>.bg{fill:#fbfcf6}.card{fill:#fffef8;stroke:#d5dec7;stroke-width:2}.accent{fill:#5f6f45}.accent2{fill:#8aa36c}.soft{fill:#eef4e6}.line{stroke:#5f6f45;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;fill:none}.thin{stroke:#8aa36c;stroke-width:2;stroke-linecap:round;fill:none}.txt{font-family:Inter,Arial,sans-serif;font-size:22px;fill:#2f3328;font-weight:700}.small{font-size:16px;fill:#68725d;font-weight:700}.title{font-size:28px;font-weight:900;fill:#2f3328}.white{fill:#fffef8}</style></defs><rect class="bg" width="1100" height="560" rx="38"/><text class="title" x="55" y="58">Схема решений по вкусу эспрессо</text><g transform="translate(70 115)"><rect class="card" width="270" height="150" rx="28"/><text class="txt" x="135" y="55" text-anchor="middle">Кислый</text><text class="small" x="135" y="88" text-anchor="middle">резкий, водянистый</text><text class="small" x="135" y="120" text-anchor="middle">помол мельче</text></g><g transform="translate(415 115)"><rect class="card" width="270" height="150" rx="28"/><text class="txt" x="135" y="55" text-anchor="middle">Горький</text><text class="small" x="135" y="88" text-anchor="middle">сухой, вяжущий</text><text class="small" x="135" y="120" text-anchor="middle">помол крупнее</text></g><g transform="translate(760 115)"><rect class="card" width="270" height="150" rx="28"/><text class="txt" x="135" y="55" text-anchor="middle">Водянистый</text><text class="small" x="135" y="88" text-anchor="middle">пустой вкус</text><text class="small" x="135" y="120" text-anchor="middle">проверить дозу</text></g><g transform="translate(245 325)"><rect class="card" width="270" height="150" rx="28"/><text class="txt" x="135" y="55" text-anchor="middle">Сухой</text><text class="small" x="135" y="88" text-anchor="middle">тяжелый, зажатый</text><text class="small" x="135" y="120" text-anchor="middle">сократить выход</text></g><g transform="translate(585 325)"><rect class="card" width="270" height="150" rx="28"/><text class="txt" x="135" y="55" text-anchor="middle">Цифры хорошие</text><text class="small" x="135" y="88" text-anchor="middle">но вкус плохой</text><text class="small" x="135" y="120" text-anchor="middle">проверить таблетку</text></g></svg>