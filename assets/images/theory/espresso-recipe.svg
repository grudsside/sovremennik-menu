<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" role="img" aria-label="Рецепт настройки эспрессо"><defs><style>.bg{fill:#fbfcf6}.card{fill:#fffef8;stroke:#d5dec7;stroke-width:2}.accent{fill:#5f6f45}.accent2{fill:#8aa36c}.soft{fill:#eef4e6}.line{stroke:#5f6f45;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;fill:none}.thin{stroke:#8aa36c;stroke-width:2;stroke-linecap:round;fill:none}.txt{font-family:Inter,Arial,sans-serif;font-size:22px;fill:#2f3328;font-weight:700}.small{font-size:16px;fill:#68725d;font-weight:700}.title{font-size:28px;font-weight:900;fill:#2f3328}.white{fill:#fffef8}</style></defs><rect class="bg" width="1100" height="520" rx="38"/><text class="title" x="55" y="58">Рабочий рецепт эспрессо</text><g transform="translate(80 130)"><rect class="card" width="250" height="240" rx="30"/><text class="small" x="125" y="58" text-anchor="middle">Доза кофе</text><text class="title" x="125" y="120" text-anchor="middle">17–18 г</text><path class="line" d="M95 160 h60"/><text class="small" x="125" y="205" text-anchor="middle">молотый кофе</text></g><path class="line" d="M355 250 H445"/><path class="line" d="M445 250 l-22 -16 M445 250 l-22 16"/><g transform="translate(470 130)"><rect class="card" width="250" height="240" rx="30"/><text class="small" x="125" y="58" text-anchor="middle">Выход напитка</text><text class="title" x="125" y="120" text-anchor="middle">34–36 г</text><path class="line" d="M92 166 q33 22 66 0"/><text class="small" x="125" y="205" text-anchor="middle">готовый эспрессо</text></g><path class="line" d="M745 250 H835"/><path class="line" d="M835 250 l-22 -16 M835 250 l-22 16"/><g transform="translate(860 130)"><rect class="card" width="170" height="240" rx="30"/><text class="small" x="85" y="58" text-anchor="middle">Время</text><text class="title" x="85" y="120" text-anchor="middle">28–32</text><text class="txt" x="85" y="158" text-anchor="middle">сек</text><text class="small" x="85" y="205" text-anchor="middle">по таймеру</text></g><text class="small" x="550" y="440" text-anchor="middle">Цифры помогают попасть в диапазон, но окончательное решение всегда по вкусу.</text></svg>