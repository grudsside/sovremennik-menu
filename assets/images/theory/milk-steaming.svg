<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" role="img" aria-label="Два этапа взбивания молока"><defs><style>.bg{fill:#fbfcf6}.card{fill:#fffef8;stroke:#d5dec7;stroke-width:2}.accent{fill:#5f6f45}.accent2{fill:#8aa36c}.soft{fill:#eef4e6}.line{stroke:#5f6f45;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;fill:none}.thin{stroke:#8aa36c;stroke-width:2;stroke-linecap:round;fill:none}.txt{font-family:Inter,Arial,sans-serif;font-size:22px;fill:#2f3328;font-weight:700}.small{font-size:16px;fill:#68725d;font-weight:700}.title{font-size:28px;font-weight:900;fill:#2f3328}.white{fill:#fffef8}</style></defs><rect class="bg" width="1100" height="520" rx="38"/><text class="title" x="55" y="58">Взбивание молока: 2 этапа</text><g transform="translate(90 130)"><rect class="card" width="400" height="270" rx="32"/><text class="txt" x="200" y="58" text-anchor="middle">1. Растяжение</text><path class="line" d="M165 110 h70 v105 h-70 z"/><path class="thin" d="M165 155 h70"/><circle class="accent2" cx="198" cy="130" r="9"/><path class="thin" d="M250 85 v60"/><text class="small" x="200" y="245" text-anchor="middle">Кончик трубки у поверхности</text></g><g transform="translate(610 130)"><rect class="card" width="400" height="270" rx="32"/><text class="txt" x="200" y="58" text-anchor="middle">2. Закручивание</text><path class="line" d="M165 110 h70 v105 h-70 z"/><path class="thin" d="M165 155 h70"/><path class="line" d="M175 170 c40 -40 85 15 35 35 c-42 15 -62 -35 -15 -58"/><path class="thin" d="M250 105 v82"/><text class="small" x="200" y="245" text-anchor="middle">Молоко вращается как вихрь</text></g><text class="small" x="550" y="460" text-anchor="middle">Ориентир температуры: 55–60°C. Молоко должно быть гладким, глянцевым и без крупных пузырей.</text></svg>