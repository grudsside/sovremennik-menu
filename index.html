олландским соусом, посыпаем четверговой солью и добавляем микрозелень.","descriptionCollapsed":true,"ingredients":["Булочка хоккайдо обжаренная на топленом масле","Крем-брынза","Лосось слабой соли","2 яйца пашот","Соус Олландез (Голландез, голландский соус)","Четверговая соль и микрозелень"],"image":"assets/images/kitchen/yayca-benedikt-s-lososem.jpg","isArchive":false,"note":"Существует несколько версий возникновения этого блюда.В интервью для журнала The New Yorker в 1942 году брокер Лемюэль Бенедикт утверждал, что забрел в отель Уолдорф-Астория в 1894 году, надеясь найти лекарство от утреннего похмелья и заказал «тосты с маслом, вареными яйцами, беконом и голландским соусом». Оскар Чирки, метрдотель ресторана, был настолько впечатлен таким блюдом, что предложил его на завтрак и обед, заменив тосты с ветчиной на английскую булочку с беконом. По другой версии, яйца Бенедикт придумал шеф-повар ресторана Delmonico’s в Нью-Йорке для мистера и миссис Бенедикт, его частых посетителей. Однажды мистер Бенедикт сказал метрдотелю: «Не могли бы вы предложить нам…","tags":[]},{"id":"kitchen","section":"kitchen","category":"Бенедикты","title":"БЕНЕДИКТ С КРЕВЕТКАМИ И АВОКАДО КРЕМОМ","price":"650 ₽","volume":"","time":"","kbju":{"calories":"____","protein":"____","fat":"____","carbs":"____"},"description":"Бенедикт с креветками и авокадо кремом — сытное блюдо для завтрака или бранча: нежная основа, яйца пашот и соус создают мягкий сливочный вкус.","descriptionCollapsed":true,"ingredients":["Булочка Хоккайдо (бриошь)","Крем-авокадо","Креветки в азиатских соусах","2 яйца пашот","Соус Олландез (Голландез, голландский соус)","Четверговая соль и микрозелень"],"image":"assets/images/kitchen/benedikt-s-krevetkami-i-avokado-kremom.jpg","isArchive":false,"note":"","tags":[]},{"id":"kitchen","section":"kitchen","category":"Сэндвичи и драники","title":"ТОСТ С ЛОСОСЕМ И АВОКАДО","price":"590 ₽","volume":"","time":"","kbju":{"calories":"____","protein":"____","fat":"____","carbs":"____"},"d /images/kitchen/tost-s-mortadelloy.jpg","isArchive":false,"note":"Мортаделла — вареная колбаса из Болоньи (регион Эмилия-Романья). За пределами этого города колбасу часто называют болонской, хотя под таким названием чаще встречается упрощённая версия мортаделлы. Мортаделлу делают из свиного фарша и свиного сала, из-за чего образуется характерная пятнистая структура.","tags":[]},{"id":"kitchen","section":"kitchen","category":"Сэндвичи и драники","title":"ДРАНИК КАРТОФЕЛЬНЫЙ С ТАМБОВСКИМ ОКОРОКОМ","price":"440 ₽","volume":"","time":"","kbju":{"calories":"____","protein":"____","fat":"____","carbs":"____"},"description":"Драники, как известно, это традиционное белорусское блюдо, представляющее собой картофельные оладьи. Хрустящий снаружи и сочный внутри драник отлично дополняют тамбовский окорок и сливочно-воздушная эспума (пенка) из пармезана. Яркости вкусу добавляет насыщенный ароматом грибной соус.","descriptionCollapsed":true,"ingredients":["Драник картофельный (тертый картофель, мука, сметана, крахмал)","Начинка драника (пюре на сливках и сливочном масле , жареные шампиньоны, соломка петрушки, окорок)","Тамбовский окорок (свинина)","С-пума пармезан (креметта , сливки , пармезан)","Соус - грибной “Жу” (шампиньоны, сливочное масло, черная соя)"],"image":"assets/images/kitchen/dranik-kartofelnyy-s-tambovskim-okorokom.jpg","isArchive":false,"note":"Картофельные оладьи (разг. драники) – популярное блюдо европейской кухни. Картофельные блины и оладьи можно встретить практически везде, где в пищу употребляется картофель – от Латинской Америки до Северной Европы, в частности, белорусской (белор. дранiкi), украинской (укр. деруни), русской, польской, немецкой и еврейской кухнях. Являются неотъемлемым атрибутом белорусской кухни. По одной из версий драники пришли в белорусскую кухню из немецкой благодаря выпущенному в 1830 году труду «Кухар добра навучаны» Яна Шитлера, в котором он привел позаимствованный у немцев рецепт оладий из картофеля.","tags":[]},{"id":"kitchen","sec КИМ ОКОРОКОМ И СЫРНЫМ СОУСОМ","price":"440 ₽","volume":"","time":"","kbju":{"calories":"____","protein":"____","fat":"____","carbs":"____"},"description":"Тонкие блинчики на закваске – идеальная основа для этого блюда. Их «ажурная» текстура и нежный вкус прекрасно дополняются сочностью тамбовского окорока и воздушной сливочностью эспумы (пенки) из пармезана. А соус Морне, зеленое масло и четверговая соль расставляют яркие акценты в сочетании всех ингредиентов.","descriptionCollapsed":true,"ingredients":["Блины на закваске","Соус Морне","Тамбовский окорок","С-пума пармезан","Зеленое масло и четверговая соль"],"image":"assets/images/kitchen/bliny-s-tambovskim-okorokom-i-syrnym-sousom.jpg","isArchive":false,"note":"","tags":[]},{"id":"kitchen","section":"kitchen","category":"Яйца","title":"ГЛАЗУНЬЯ СО СТРАЧАТЕННОЙ И МОРТАДЕЛЛОЙ","price":"490 ₽","volume":"","time":"","kbju":{"calories":"____","protein":"____","fat":"____","carbs":"____"},"description":"Глазунья со страчатенной и мортаделлой — позиция меню на основе: Глазунья из 3х яиц, Мортаделла, Страчателла, Зеленое масло, Тартин. Описание можно дополнить после финальной дегустации.","descriptionCollapsed":true,"ingredients":["Глазунья из 3х яиц","Мортаделла","Страчателла","Зеленое масло","Тартин"],"image":"assets/images/kitchen/glazunya-so-strachatennoy-i-mortadelloy.jpg","isArchive":false,"note":"","tags":[]},{"id":"kitchen","section":"kitchen","category":"Яйца","title":"ШАКШУКА","price":"440 ₽","volume":"","time":"","kbju":{"calories":"____","protein":"____","fat":"____","carbs":"____"},"description":"Слово «шакшука» происходит из арабского языка и означает «смесь», «мешанина». И такое название объясняет все: в этом блюде чего только не намешано! Оно готовится из яиц, свежих овощей, специй, масла и зелени, и подается с большим куском хлеба (у нас это тартин). Многие уверены, что шакшука – блюдо израильское. Более того, точно также считают и сами израильтяне, часто называя его «еврейской яичницей». На самом же деле еврейская кухня некогда позаимствовала рецепт у… арабской. Да-да, шакшука – блюдо восточное. Но, будем справедливы – именно в Израиле оно не только прижилось, но и обросло множеством модификаций на любой вкус. Мы подаем шакшуку традиционно – на порционной раскаленной сковородке. И считаем, что в этом есть особый колорит.","descriptionCollapsed":true,"ingredients":["2 яйца","Баклажаны печеные","Томаты конкассе","Печеный перец","Пряные специи","Салат шакшука (кинза, каперсы, красный лук, зеленое масло)","Острое пряное масло на основе аджики","Заправляется винным уксусом","Тартин обжаренный на топленом масле"],"image":"assets/images/kitchen/shakshuka.jpg","isArchive":false,"note":"","tags":[]},{"id":"kitchen-4","section":"kitchen","category":"Яйца","title":"СКРЭМБЛ 4 СЫРА","price":"440 ₽","volume":"","time":"","kbju":{"calories":"____","protein":"____","fat":"____","carbs":"____"},"description":"Наш скрэмбл – идеальное блюдо для любителей сыра, который удивляет своей простотой и в то же время богатством вкусовых сочетаний. Настоящая сырная сенсация! Яичную смесь мы обжариваем с сулугуни и пармезаном, затем добавляем к скрэмблу страчателлу. Отлично дополняет нежное блюдо сливочно-воздушная эспума (пенка) из пармезана, ароматное зеленое масло и четверговая соль. Скрэмбл мы подаем с хрустящим тартином.","descriptionCollapsed":true,"ingredients":["Скрэмбл с пармезаном и сулугуни","Страчателла","С-пума пармезан","Зеленое масло","Четверговая соль","Тартин обжаренный на топленом масле"],"image":"assets/images/kitchen/skrembl-4-syra.jpg","isArchive":false,"note":"Скрэмбл –это блюдо из яиц, приготовленное особым способом, что придает ему нежную структуру. В русской традиции оно больше известно как яичница-болтунья. Если классический омлет – «изобретение» французов, то скрэмбл, по расхожему мнению, придумали американцы. Ведь они хорошо известны своей страстью к быстрой еде. А такое блюдо – едва ли не самая быстрая из возможных. Скрэмбл отличается от омлета способом обжаривания. Отличие в том, что омлет требует томления. А чтобы сделать скрэмбл, хватит нескольких минут – мы готовим его на средней температуре, постоянно перемешивая яичную смесь, пока она не превратится в нежную однородную массу.","tags":[]},{"id":"kitchen","section":"kitchen","category":"Яйца","title":"СКРЭМБЛ С КРЕВЕТКАМИ И БЕКОНОМ","price":"490 ₽","volume":"","time":"","kbju":{"calories":"____","protein":"____","fat":"____","carbs":"____"},"description":"Скрэмбл с креветками и беконом — это изысканное блюдо, которое смело можно подать на завтрак или обед. В нем сочетаются нежные креветки и хрустящий бекон, создавая гармоничное сочетание вкусов. Соус биск и терияки добавляют пряности и сладковатую нотку, прекрасно дополняя море и бекон. В завершение, посыпают блюдо стружкой тунца, что придает ему эффектный вид и усиливает общий вкус. Это блюдо не только аппетитно выглядит, но и насыщено белком, что делает его отличным вариантом для тех, кто стремится к активному образу жизни.","descriptionCollapsed":true,"ingredients":["Скрэмбл ( 2 яйца)","Бекон","Креветка маринованная в соусе Азия","Шпинат","Соус Биск","Соус Терияки (содержит мед)","Стружка тунца","Зеленое масло"],"image":"assets/images/kitchen/skrembl-s-krevetkami-i-bekonom.jpg","isArchive":false,"note":"","tags":[]},{"id":"kitchen","section":"kitchen","category":"Молочка","title":"ГРЕЧЕСКИЙ ЙОГУРТ С МАНГО И ГРАНОЛОЙ","price":"390 ₽","volume":"","time":"","kbju":{"calories":"____","protein":"____","fat":"____","carbs":"____"},"description":"Греческий йогурт с манго и гранолой — легкая молочная позиция с фруктовой сладостью и хрустящей гранолой.","descriptionCollapsed":true,"ingredients":["Йогурт греческий","Манго","Гранола (сплющенная овсянка, орехи и мёд)","Сублимированная малина","Соль четверговая"],"image":"assets/images/kitchen/grecheskiy-yogurt-s-mango-i-granoloy.jpg","isArchive":false,"note":"","tags":[]},{"id":"kitchen","section":"kitchen","category":"Молочка","title":"СЫРНИКИ СО СМЕТАНОЙ И ЯГОДНЫМ СОУСОМ","price":"390 ₽","volume":"","time":"","kbju":{"calories":"____","protein":"____","fat":"____","carbs":"____"},"description":"Наши нежные и пышные сырники мы лепим из творога 18% жирности. Обжаренные до золотистой корочки, они отлично сочетаются с густой сметаной и ягодным соусом – в меру сладким и с легкой кислинкой.","descriptionCollapsed":true,"ingredients":["Обжаренные сырники (протертый творог, креметта, желток , манная крупа, сахар обычный/ванильный)","Малиновый соус","Сметана","Четверговая соль"],"image":"assets/images/kitchen/syrniki-so-smetanoy-i-yagodnym-sousom.jpg","isArchive":false,"note":"Почему именно «сырники», а не «творожники»? Когда из прокисшего молока стали делать сырники, слова «творог» не существовало. А под словом «сыр» понимался любой продукт, сделанный из сырого молока. Слово «творог» появилось позже: Петр I завез в Россию не только табак и картофель, но еще и сыр. Технология приготовления заморского сыра сильно отличалась от того, который делали у нас – по вкусу он был похож на современный сыр. Чтобы не было путаницы, производители переименовали наш сыр в творог, а заморский сыр остался сыром. Есть версия, что слово «творог» произошло от слова «творить», мол, чего только с творогом не делали в отличие от твердых сыров.","tags":[]},{"id":"kitchen","section":"kitchen","category":"Комбо-завтраки","title":"АНГЛИЙСКИЙ ЗАВТРАК","price":"640 ₽","volume":"","time":"","kbju":{"calories":"____","protein":"____","fat":"____","carbs":"____"},"description":"Английский завтрак – это плотный и сытный завтрак, который является одним из наиболее известных и узнаваемых блюд британской кухни. Он представляет собой насыщенное блюдо, состоящее из нескольких компонентов, приготовленных по-разному и обычно подаваемых на одной тарелке. Конкретный набор продуктов варьируется в зависимости от региона. Обычно в него входят бекон, колбаса, яйца, тосты, грибы, помидоры и другие ингредиенты. В наш английский завтрак с глазуньей из двух яиц из мясных ингредиентов входят бекон и о ки","Мед гречишный","Масло сливочное"],"image":"assets/images/kitchen/ovsyanaya-kasha.jpg","isArchive":false,"note":"","tags":[]},{"id":"kitchen","section":"kitchen","category":"Каши","title":"ЗЕЛЕНАЯ ГРЕЧКА С ЯЙЦОМ ПАШОТ","price":"390 ₽","volume":"","time":"","kbju":{"calories":"____","protein":"____","fat":"____","carbs":"____"},"description":"Зеленая гречка и яйцо пашот – отличное сочетание, богатое белком и питательными веществами. Что такое зеленая гречка? Это необработанное зерно гречихи. Ее отличие от обычной гречки заключается в том, что зеленую гречку не подвергают термической обработке, такой как обжаривание или пропаривание. Зеленая гречка помимо своего отличительного цвета и вкуса также является очень полезной – она содержит в себе большое количество аминокислот и антиоксидантов и способствует мягкому и естественному очищению организма. Наше блюдо гармонично дополняют ароматный соус песто и нежно - пикантный пармезан.","descriptionCollapsed":true,"ingredients":["Зеленая гречка на воде","Сливочное масло","Пармезан","Песто (фундук, фреш лайма, базилик ,петрушка, масло растительное, соль)","Яйцо пашот","Соль четверговая и молотый черный перец"],"image":"assets/images/kitchen/zelenaya-grechka-s-yaycom-pashot.jpg","isArchive":false,"note":"","tags":[]},{"id":"desserts","section":"desserts","category":"Десерты","title":"МЕРЕНГОВЫЙ РУЛЕТ","price":"320 ₽","volume":"","time":"","kbju":{"calories":"____","protein":"____","fat":"____","carbs":"____"},"description":"Швейцарская меренга, крем на основе маскарпоне, сливок и сахара, малиновый джем. Шапочка из крем-чиз и сверху сублимированная малина.","descriptionCollapsed":true,"ingredients":["Состав уточнить по актуальной техкарте"],"image":"assets/images/desserts/merengovyy-rulet.jpg","isArchive":false,"note":"","tags":[]},{"id":"desserts","section":"desserts","category":"Десерты","title":"ЛИМОН В КУБЕ","price":"360 ₽","volume":"","time":"","kbju":{"calories":"","protein":"","fat":"","carbs":""},"description":"Нежно
