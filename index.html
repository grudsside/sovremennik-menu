ion":"Яйца Бенедикт считаются классическим блюдом американской кухни. Идеально подходят для завтрака или бранча. В действительности это бутерброд: 2 яйца пашот с кремом-брынзой и слегка подсоленным лососем на воздушной булочке бриошь. Мы используем только самые свежие яйца, чтобы желток оставался в нужном кремообразном состоянии. Заправляем блюдо голландским соусом, посыпаем четверговой солью и добавляем микрозелень.","descriptionCollapsed":true,"ingredients":["Булочка хоккайдо обжаренная на топленом масле","Крем-брынза","Лосось слабой соли","2 яйца пашот","Соус Олландез (Голландез, голландский соус)","Четверговая соль и микрозелень"],"image":"assets/images/kitchen/yayca-benedikt-s-lososem.jpg","isArchive":false,"note":"Существует несколько версий возникновения этого блюда.В интервью для журнала The New Yorker в 1942 году брокер Лемюэль Бенедикт утверждал, что забрел в отель Уолдорф-Астория в 1894 году, надеясь найти лекарство от утреннего похмелья и заказал «тосты с маслом, вареными яйцами, беконом и голландским соусом». Оскар Чирки, метрдотель ресторана, был настолько впечатлен таким блюдом, что предложил его на завтрак и обед, заменив тосты с ветчиной на английскую булочку с беконом. По другой версии, яйца Бенедикт придумал шеф-повар ресторана Delmonico’s в Нью-Йорке для мистера и миссис Бенедикт, его частых посетителей. Однажды мистер Бенедикт сказал метрдотелю: «Не могли бы вы предложить нам…","tags":[]},{"id":"kitchen","section":"kitchen","category":"Бенедикты","title":"БЕНЕДИКТ С КРЕВЕТКАМИ И АВОКАДО КРЕМОМ","price":"650 ₽","volume":"","time":"","kbju":{"calories":"____","protein":"____","fat":"____","carbs":"____"},"description":"Бенедикт с креветками и авокадо кремом — сытное блюдо для завтрака или бранча: нежная основа, яйца пашот и соус создают мягкий сливочный вкус.","descriptionCollapsed":true,"ingredients":["Булочка Хоккайдо (бриошь)","Крем-авокадо","Креветки в азиатских соусах","2 яйца пашот","Соус Олландез (Голландез, голландский соус)","Четверговая ), русской, польской, немецкой и еврейской кухнях. Являются неотъемлемым атрибутом белорусской кухни. По одной из версий драники пришли в белорусскую кухню из немецкой благодаря выпущенному в 1830 году труду «Кухар добра навучаны» Яна Шитлера, в котором он привел позаимствованный у немцев рецепт оладий из картофеля.","tags":[]},{"id":"kitchen","section":"kitchen","category":"Сэндвичи и драники","title":"ДРАНИК ИЗ ЦУКИНИ С РИЙЕТОМ ИЗ ЛОСОСЯ","price":"640 ₽","volume":"","time":"","kbju":{"calories":"____","protein":"____","fat":"____","carbs":"____"},"description":"Это легкое, но одновременно сытное блюдо. Драник из тертого цукини мы жарим на топленом масле до сочной хрустящей корочки. Добавляем густую сметану и нежный рийет из лосося. Сверху кладем пряно-острую рукколу и заправляем ароматным зеленым маслом. Щепотка четверговой соли… и вкусный и полезный завтрак готов!","descriptionCollapsed":true,"ingredients":["Драник (тертый цуккини, мука, яйцо, соль)","Сметана","Рийет (паста из 3х видов лосося: су-вид, слабосоленый и мусс из лосося)","*мусс из лосося (креметта, сливки, лосось)","Рукола","Четверговая соль и зеленое масло"],"image":"assets/images/kitchen/dranik-iz-cukini-s-riyetom-iz-lososya.jpg","isArchive":false,"note":"","tags":[]},{"id":"kitchen","section":"kitchen","category":"Сэндвичи и драники","title":"МАКМАФФИН С ЯЙЦОМ","price":"440 ₽","volume":"","time":"","kbju":{"calories":"____","protein":"____","fat":"____","carbs":"____"},"description":"Разновидность сэндвича к завтраку, который послужит хорошим началом дня.","descriptionCollapsed":true,"ingredients":["Булочка пшеничная","Яйцо","Соус Олландез (Голландез, голландский соус)","Чеддер","Свиная котлета 2шт","*котлета (на основе свиной грудинки , цитрон, шалфей, тимьян, лук конфи, перец, соль, сахар)"],"image":"assets/images/kitchen/makmaffin-s-yaycom.jpg","isArchive":false,"note":"","tags":[]},{"id":"kitchen","section":"kitchen","category":"Блины","title":"БЛИНЧИКИ КРЕП-СЮЗЕТТ С МОРОЖЕНЫМ","price":"390 ₽", а закваске","Луковый крем (креметта, шпинат , зеленый лук)","Слабосоленый лосось","Сыворотка с зеленым маслом и медом","(сыворотка молочная, сливки, креметта, мед)","Микрозелень"],"image":"assets/images/kitchen/bliny-s-lososem.jpg","isArchive":false,"note":"","tags":[]},{"id":"kitchen","section":"kitchen","category":"Блины","title":"БЛИНЫ С ТАМБОВСКИМ ОКОРОКОМ И СЫРНЫМ СОУСОМ","price":"440 ₽","volume":"","time":"","kbju":{"calories":"____","protein":"____","fat":"____","carbs":"____"},"description":"Тонкие блинчики на закваске – идеальная основа для этого блюда. Их «ажурная» текстура и нежный вкус прекрасно дополняются сочностью тамбовского окорока и воздушной сливочностью эспумы (пенки) из пармезана. А соус Морне, зеленое масло и четверговая соль расставляют яркие акценты в сочетании всех ингредиентов.","descriptionCollapsed":true,"ingredients":["Блины на закваске","Соус Морне","Тамбовский окорок","С-пума пармезан","Зеленое масло и четверговая соль"],"image":"assets/images/kitchen/bliny-s-tambovskim-okorokom-i-syrnym-sousom.jpg","isArchive":false,"note":"","tags":[]},{"id":"kitchen","section":"kitchen","category":"Яйца","title":"ГЛАЗУНЬЯ СО СТРАЧАТЕННОЙ И МОРТАДЕЛЛОЙ","price":"490 ₽","volume":"","time":"","kbju":{"calories":"____","protein":"____","fat":"____","carbs":"____"},"description":"Глазунья со страчатенной и мортаделлой — позиция меню на основе: Глазунья из 3х яиц, Мортаделла, Страчателла, Зеленое масло, Тартин. Описание можно дополнить после финальной дегустации.","descriptionCollapsed":true,"ingredients":["Глазунья из 3х яиц","Мортаделла","Страчателла","Зеленое масло","Тартин"],"image":"assets/images/kitchen/glazunya-so-strachatennoy-i-mortadelloy.jpg","isArchive":false,"note":"","tags":[]},{"id":"kitchen","section":"kitchen","category":"Яйца","title":"ШАКШУКА","price":"440 ₽","volume":"","time":"","kbju":{"calories":"____","protein":"____","fat":"____","carbs":"____"},"description":"Слово «шакшука» происходит из арабского языка и означает «смесь», «мешанина». И такое название объясняет все: в этом блюде чего только не намешано! Оно готовится из яиц, свежих овощей, специй, масла и зелени, и подается с большим куском хлеба (у нас это тартин). Многие уверены, что шакшука – блюдо израильское. Более того, точно также считают и сами израильтяне, часто называя его «еврейской яичницей». На самом же деле еврейская кухня некогда позаимствовала рецепт у… арабской. Да-да, шакшука – блюдо восточное. Но, будем справедливы – именно в Израиле оно не только прижилось, но и обросло множеством модификаций на любой вкус. Мы подаем шакшуку традиционно – на порционной раскаленной сковородке. И считаем, что в этом есть особый колорит.","descriptionCollapsed":true,"ingredients":["2 яйца","Баклажаны печеные","Томаты конкассе","Печеный перец","Пряные специи","Салат шакшука (кинза, каперсы, красный лук, зеленое масло)","Острое пряное масло на основе аджики","Заправляется винным уксусом","Тартин обжаренный на топленом масле"],"image":"assets/images/kitchen/shakshuka.jpg","isArchive":false,"note":"","tags":[]},{"id":"kitchen-4","section":"kitchen","category":"Яйца","title":"СКРЭМБЛ 4 СЫРА","price":"440 ₽","volume":"","time":"","kbju":{"calories":"____","protein":"____","fat":"____","carbs":"____"},"description":"Наш скрэмбл – идеальное блюдо для любителей сыра, который удивляет своей простотой и в то же время богатством вкусовых сочетаний. Настоящая сырная сенсация! Яичную смесь мы обжариваем с сулугуни и пармезаном, затем добавляем к скрэмблу страчателлу. Отлично дополняет нежное блюдо сливочно-воздушная эспума (пенка) из пармезана, ароматное зеленое масло и четверговая соль. Скрэмбл мы подаем с хрустящим тартином.","descriptionCollapsed":true,"ingredients":["Скрэмбл с пармезаном и сулугуни","Страчателла","С-пума пармезан","Зеленое масло","Четверговая соль","Тартин обжаренный на топленом масле"],"image":"assets/images/kitchen/skrembl-4-syra.jpg","isArchive":false,"note":"Скрэмбл –это блюдо из яиц, приготовленное особым способом, что придает ему нежную структуру. В русской традиции оно больше известно как яичница-болтунья. Если классический омлет – «изобретение» французов, то скрэмбл, по расхожему мнению, придумали американцы. Ведь они хорошо известны своей страстью к быстрой еде. А такое блюдо – едва ли не самая быстрая из возможных. Скрэмбл отличается от омлета способом обжаривания. Отличие в том, что омлет требует томления. А чтобы сделать скрэмбл, хватит нескольких минут – мы готовим его на средней температуре, постоянно перемешивая яичную смесь, пока она не превратится в нежную однородную массу.","tags":[]},{"id":"kitchen","section":"kitchen","category":"Яйца","title":"СКРЭМБЛ С КРЕВЕТКАМИ И БЕКОНОМ","price":"490 ₽","volume":"","time":"","kbju":{"calories":"____","protein":"____","fat":"____","carbs":"____"},"description":"Скрэмбл с креветками и беконом — это изысканное блюдо, которое смело можно подать на завтрак или обед. В нем сочетаются нежные креветки и хрустящий бекон, создавая гармоничное сочетание вкусов. Соус биск и терияки добавляют пряности и сладковатую нотку, прекрасно дополняя море и бекон. В завершение, посыпают блюдо стружкой тунца, что придает ему эффектный вид и усиливает общий вкус. Это блюдо не только аппетитно выглядит, но и насыщено белком, что делает его отличным вариантом для тех, кто стремится к активному образу жизни.","descriptionCollapsed":true,"ingredients":["Скрэмбл ( 2 яйца)","Бекон","Креветка маринованная в соусе Азия","Шпинат","Соус Биск","Соус Терияки (содержит мед)","Стружка тунца","Зеленое масло"],"image":"assets/images/kitchen/skrembl-s-krevetkami-i-bekonom.jpg","isArchive":false,"note":"","tags":[]},{"id":"kitchen","section":"kitchen","category":"Молочка","title":"ГРЕЧЕСКИЙ ЙОГУРТ С МАНГО И ГРАНОЛОЙ","price":"390 ₽","volume":"","time":"","kbju":{"calories":"____","protein":"____","fat":"____","carbs":"____"},"description":"Греческий йогурт с манго и гранолой — легкая молочная позиция с фруктовой сладостью и хрустящей гранолой.","descriptionCollapsed":true,"ingredients":["Йогурт греческий","Манго","Гранола (сплющенная овсянка, орехи и мёд)","Сублимированная малина","Соль четверговая"],"image":"assets/images/kitchen/grecheskiy-yogurt-s-mango-i-granoloy.jpg","isArchive":false,"note":"","tags":[]},{"id":"kitchen","section":"kitchen","category":"Молочка","title":"СЫРНИКИ СО СМЕТАНОЙ И ЯГОДНЫМ СОУСОМ","price":"390 ₽","volume":"","time":"","kbju":{"calories":"____","protein":"____","fat":"____","carbs":"____"},"description":"Наши нежные и пышные сырники мы лепим из творога 18% жирности. Обжаренные до золотистой корочки, они отлично сочетаются с густой сметаной и ягодным соусом – в меру сладким и с легкой кислинкой.","descriptionCollapsed":true,"ingredients":["Обжаренные сырники (протертый творог, креметта, желток , манная крупа, сахар обычный/ванильный)","Малиновый соус","Сметана","Четверговая соль"],"image":"assets/images/kitchen/syrniki-so-smetanoy-i-yagodnym-sousom.jpg","isArchive":false,"note":"Почему именно «сырники», а не «творожники»? Когда из прокисшего молока стали делать сырники, слова «творог» не существовало. А под словом «сыр» понимался любой продукт, сделанный из сырого молока. Слово «творог» появилось позже: Петр I завез в Россию не только табак и картофель, но еще и сыр. Технология приготовления заморского сыра сильно отличалась от того, который делали у нас – по вкусу он был похож на современный сыр. Чтобы не было путаницы, производители переименовали наш сыр в творог, а заморский сыр остался сыром. Есть версия, что слово «творог» произошло от слова «творить», мол, чего только с творогом не делали в отличие от твердых сыров.","tags":[]},{"id":"kitchen","section":"kitchen","category":"Комбо-завтраки","title":"АНГЛИЙСКИЙ ЗАВТРАК","price":"640 ₽","volume":"","time":"","kbju":{"calories":"____","protein":"____","fat":"____","carbs":"____"},"description":"Английский завтрак – это плотный и сытный завтрак, который является одним из наиболее известных и узнаваемых блюд британской кухни. Он представляет собой насыщенное точнить по актуальной техкарте"],"image":"assets/images/desserts/danish-s-grushey.jpg","isArchive":false,"note":"","tags":[]},{"id":"archive","section":"archive","category":"Салаты и боулы","title":"“БУДДА” БОУЛ","price":"цена уточняется","volume":"","time":"","kbju":{"calories":"____","protein":"____","fat":"____","carbs":"____"},"description":"“Будда” боул — сбалансированный боул с крупой, овощами и выразительной заправкой. Подходит как легкий, но сытный вариант основного блюда.","descriptionCollapsed":true,"ingredients":["Киноа","Бобы эдамаме","Гуакамоле","Жареные кешью","Тыква печеная","Огурец свеж (слайс)","Фалафель (обжаренные оладьи из бобовых (нут) с добавлением измельченной зелени)","Заправка мята-кокос (кокосовое молоко, сметана, винный уксус, фреш лайма, мята, соль, сахар)"],"image":"assets/images/archive/budda-boul.jpg","isArchive":true,"note":"","tags":["архив"]},{"id":"archive","section":"archive","category":"Сэндвичи и драники","title":"ФРЕНЧ-ТОСТ С МАНГО","price":"440 ₽","volume":"","time":"","kbju":{"calories":"____","protein":"____","fat":"____","carbs":"____"},"description":"Френч-тост – одно из самых популярных блюд для завтрака, наряду с яйцом Бенедикт, причем не только во Франции, но и в других странах. Помните, как в детстве мама готовила на завтрак сладкие гренки из залежавшегося хлеба, пропитанного яично-молочной смесью? Это французский тост и есть! Разумеется, варианты приготовления могут различаться, но суть действительно одна. История блюда прозаична: таким образом «спасали» хлеб.","descriptionCollapsed":true,"ingredients":["Хокайдо в англезе 1 шт ( 1/2 одного куска )","Манного","Мороженое ваниль","Сахарная пудра ( сверху на булку )","Микро-зелень базилик","Соль четверговая"],"image":"assets/images/archive/french-tost-s-mango.jpg","isArchive":true,"note":"","tags":["архив"]},{"id":"archive","section":"archive","category":"Молочка","title":"ТВОРОЖНЫЕ НЬОККИ","price":"цена уточняется","volume":"","time":"","kbju":{"calories":"____","protein":"____","fat":"____","carbs":"____"},"description":"Творожные ньокки — позиция меню на основе: Ньокки творожные (небольшие клецки из теста на пшеничной муке с яйцом), Йогурт ванильный (греческий йогурт, ванильный сахар с натуральной ванилью), Моченая черника, Четверговая соль. Описание можно дополнить после финальной дегустации.","descriptionCollapsed":true,"ingredients":["Ньокки творожные (небольшие клецки из теста на пшеничной муке с яйцом)","Йогурт ванильный (греческий йогурт, ванильный сахар с натуральной ванилью)","Моченая черника","Четверговая соль"],"image":"assets/images/archive/tvorozhnye-nokki.jpg","isArchive":true,"note":"","tags":["архив"]},{"id":"archive","section":"archive","category":"Каши","title":"ГРЕЧКА СЛИВОЧНАЯ С ОРЕХАМИ","price":"цена уточняется","volume":"","time":"","kbju":{"calories":"____","protein":"____","fat":"____","carbs":"____"},"description":"Это блюдо – настоящее удовольствие для гурманов, которые ценят необычные и яркие сочетания самых простых ингредиентов. Кстати, гречка сейчас в моде. Она везде! Это главная зерновая культура этого года. В ней много клетчатки, белка, микроэлементов. Сегодня ее не только едят как гарнир, но и добавляют в напитки – например, в горячий шоколад и какао.","descriptionCollapsed":true,"ingredients":["Гречневая крупа","С-пума пармезан","Карамелизованные грецкие орехи","Попкорн гречка, семена льна","Гречишный мед (аллерген)","Масло сливочное","Молоко","Сливки","Оливковое масло"],"image":"assets/images/archive/grechka-slivochnaya-s-orehami.jpg","isArchive":true,"note":"","tags":["архив"]},{"id":"archive","section":"archive","category":"Десерты","title":"МУССОВЫЙ ПОНЧИК ШОКОЛАД-МАРАКУЙЯ","price":"440 ₽","volume":"","time":"","kbju":{"calories":"____","protein":"____","fat":"____","carbs":"____"},"description":"Шоколадный мусс, конфи из маракуйи, Брауни, глазурь на основе молочного шоколада с добавлением арахиса и фундука (аллерген), подложка из классического песочного теста с добавлением миндальной муки (алл небольшую горчинку, которая, между тем, за счёт добавления соли и засахаренных грецких орехов, превращается в идеально сбалансированную булочку.","descriptionCollapsed":true,"ingredients":["Состав уточнить по актуальной техкарте"],"image":"assets/images/archive/kosichka-s-karamelyu-i-greckim-orehami.jpg","isArchive":true,"note":"","tags":["архив"]},{"id":"archive","section":"archive","category":"Слоеная выпечка","title":"УЛИТКА С ИЗЮМОМ","price":"цена уточняется","volume":"","time":"","kbju":{"calories":"____","protein":"____","fat":"____","carbs":"____"},"description":"Слоеная улитка в смеси специй из молотого кардамона, молотой корица и тростникового сахара. Поливается сиропом из смеси таких же специй. Сверху украшается изюмом вываренным в ромовом сиропе. Яркая, немного терпкая, ароматная, «согревающая», идеальна к любому напитку и к столику у окна, чтобы задумчиво смотреть и думать о(придумайте сами или спросите гостей)","descriptionCollapsed":true,"ingredients":["Состав уточнить по актуальной техкарте"],"image":"assets/images/archive/ulitka-s-izyumom.jpg","isArchive":true,"note":"","tags":["архив"]},{"id":"archive","section":"archive","category":"Слоеная выпечка","title":"ДАНИШ С АБРИКОСОВЫМ ДЖЕМОМ","price":"цена уточняется","volume":"","time":"","kbju":{"calories":"____","protein":"____","fat":"____","carbs":"____"},"description":"Даниш слоеный, Франжипан(как в миндальных круассанах, крем на основе миндальной муки), абрикосовый джем с кусочками абрикоса, миндальные лепестки и сахарная пудра. Самая сладкая позиция из нового меню, но и одна из самых сочных. На мой взгляд, лучше всего замэтчится с простыми напитками, без сахара(но выбор сладкой комы - тоже выбор, помните об этом, если кто-то хочет жестко засахариться - позвольте им)","descriptionCollapsed":true,"ingredients":["Состав уточнить по актуальной техкарте"],"image":"assets/images/archive/danish-s-abrikosovym-dzhemom.jpg","isArchive":true,"note":"","tags":["архив"]}],"lessons":[{"id":"coffee-basics","section":"theory","category":"Кофе","title":"Все что нужно знать о кофе","duration":"30–40 минут","level":"База для сотрудников","summary":"Базовое обучение для сотрудников: путь кофе от ягоды до чашки, обработка, вкус, экстракция, свежесть, молоко и простое объяснение напитков гостю.","blocks":[{"type":"lead","text":"Цель обучения — дать сотруднику понятную базу: что такое кофе, из чего складывается вкус, почему один эспрессо бывает кислым, другой горьким, и как объяснять это гостю простым языком."},{"type":"cards","title":"1. Кофе как продукт","cards":[{"title":"Кофе — это не порошок, а ягода","text":"Кофейные зерна — это семена внутри кофейной ягоды. До чашки зерно проходит путь: выращивание, сбор, обработка, сушка, обжарка, помол и приготовление."},{"title":"Арабика и робуста","text":"В кофейне чаще работают с арабикой: она обычно сложнее по аромату, кислотности и сладости. Робуста чаще плотнее, грубее и горче, но дает крепость и крема."},{"title":"Спешелти — это качество лота","text":"Спешелти называют кофе высокого качества. Важно: оценка относится к конкретному лоту, а не просто к названию сорта или страны."},{"title":"Происхождение важно","text":"Страна, регион, высота, климат и ферма влияют на вкус. Поэтому один кофе может быть ягодным и сочным, а другой — шоколадным и ореховым."}]},{"type":"cards","title":"2. Обработка кофе и вкус","cards":[{"title":"Мытая обработка","text":"Чаще дает более чистый, понятный и яркий вкус. В чашке легче почувствовать кислотность, фруктовость и прозрачность."},{"title":"Натуральная обработка","text":"Зерно сушится вместе с ягодой, поэтому вкус часто получается более сладким, плотным, ягодным или ферментированным."},{"title":"Анаэробная обработка","text":"Ферментация проходит в среде без кислорода. Такой кофе часто яркий, необычный, с выраженными фруктовыми или экзотическими оттенками."},{"title":"Что говорить гостю","text":"Не нужно перегружать терминами. Лучше объяснять вкус: чище и ярче, слаще и плотнее, необычнее и фруктовее."}]},{"type":"cards","title":"3. Как описывать вкус кофе","cards":[{"title":"Кислотность","text":"Это не “кислый испорченный вкус”, а ощущение свежести: яблоко, цитрус, ягоды. Хорошая кислотность — чистая и приятная."},{"title":"Сладость","text":"Ощущение карамели, шоколада, спелых фруктов или меда. Чем больше сладости, тем чашка воспринимается мягче и приятнее."},{"title":"Тело","text":"Тактильное ощущение напитка: водянистый, чайный, сливочный, плотный, сиропистый. Это то, насколько “объемным” кажется кофе во рту."},{"title":"Послевкусие","text":"То, что остается после глотка. Хорошее послевкусие — чистое, приятное и продолжительное; плохое — сухое, грязное или резко горькое."}]},{"type":"callout","title":"Главное слово — баланс","text":"Вкусный кофе — это баланс сладости, кислотности, горечи, тела и послевкусия. Если одна характеристика резко выбивается, напиток воспринимается несбалансированным."},{"type":"table","title":"4. Экстракция простым языком","headers":["Состояние","Как ощущается","Что это значит"],"rows":[["Недоэкстракция","Кисло, резко, водянисто, мало сладости","Вода забрала из кофе недостаточно вкуса. Часто причина — слишком крупный помол или быстрый пролив."],["Баланс","Сладко, чисто, приятно, вкус раскрыт","Вода забрала нужное количество вкусовых веществ. Это цель настройки."],["Переэкстракция","Горько, сухо, вяжуще, тяжело","Вода забрала слишком много горьких и сухих веществ. Часто причина — слишком мелкий помол или долгий пролив."]]},{"type":"steps","title":"5. Как оценивать эспрессо","items":["Сначала оценить аромат: чистый он или неприятный, яркий или плоский.","Перемешать эспрессо ложкой, чтобы вкус был равномерным.","Попробовать и определить, что сильнее выбивается: кислотность, горечь, водянистость или сухость.","Оценить тело: напиток пустой, нормальный или слишком тяжелый.","Оценить послевкусие: чистое и приятное или сухое, грязное, короткое.","После этого принимать решение по настройке, а не менять параметры вслепую."]},{"type":"cards","title":"6. Помол, свежесть и хранение","cards":[{"title":"Помол","text":"Помол — главный инструмент бариста. Мельче — вода идет медленнее и вкус становится интенсивнее. Крупнее — вода идет быстрее и вкус становится легче."},{"title":"Свежесть обжарки","text":"Слишком свежее зерно может быть нестабильным и газированным по вкусу. Старое зерно часто становится плоским, теряет сладость, кислотность и тело."},{"title":"Хранение","text":"Зерно нужно беречь от воздуха, света, влажности и лишнего тепла. Открытый пакет быстрее теряет аромат и стабильность."},{"title":"Чистота оборудования","text":"Старая кофейная пыль и масла дают грязный вкус. Кофемолку и кофемашину нужно чистить регулярно, иначе настройка не спасет напиток."}]},{"type":"cards","title":"7. Как кофе сочетается с молоком","cards":[{"title":"Молоко добавляет сладость","text":"Молочный сахар делает напиток мягче. Поэтому капучино и латте часто воспринимаются гостями слаще, чем черный кофе."},{"title":"Жиры дают текстуру","text":"Жирность влияет на сливочность и округлость напитка. Слишком плотное молоко может перекрыть деликатный кофе."},{"title":"Белки помогают пене","text":"Белки отвечают за стабильность и эластичность молочной пены. Без хорошей текстуры не получится чистый латте-арт."},{"title":"Баланс важнее состава","text":"Задача бариста — не просто добавить молоко, а сохранить вкус кофе и сделать напиток гармоничным."}]},{"type":"table","title":"8. Как объяснять кофе гостю","headers":["Запрос гостя","Что предложить","Как объяснить"],"rows":[["Хочу просто черный кофе","Американо","Черный кофе в большем объеме, мягче и легче эспрессо."],["Хочу крепкий маленький кофе","Эспрессо","Короткий концентрированный напиток с ярким кофейным вкусом."],["Хочу классику с молоком","Капучино","Баланс кофе, молока и молочной текстуры."],["Хочу мягкий молочный напиток","Латте","Больше молока, вкус кофе мягче и деликатнее."],["Хочу кофейнее, но с молоком","Флэт уайт","Более выраженный вкус кофе при молочной текстуре."],["Хочу сладкий десертный кофе","Раф или напиток с сиропом","Сливочный, сладкий и более десертный профиль."]]},{"type":"checklist","title":"Что должен запомнить сотрудник","items":["Кофе — продукт с происхождением, обработкой, обжаркой и свежестью.","Вкус описывают через кислотность, сладость, тело, послевкусие и баланс.","Кисло и водянисто — часто недоэкстракция.","Горько и сухо — часто переэкстракция.","Помол — главный инструмент настройки эспрессо.","Гостю нужно объяснять напитки простыми словами: крепче/мягче, черный/молочный, сладкий/без сахара.","Не нужно обещать конкретные ноты вкуса, если они не указаны для текущего зерна."]},{"type":"callout","title":"Итог","text":"Сотрудник должен не заучить сложные кофейные термины, а понимать логику: от зерна и обработки к вкусу, от помола и экстракции к балансу, от запроса гостя к правильной рекомендации."}],"source":"Материалы адаптированы по странице Atlas Coffee «Краткая инструкция бариста» и внутренним стандартам Современника."},{"id":"milk-steaming","section":"theory","category":"Бариста","title":"Инструкция по взбиванию молока","duration":"15–20 минут","level":"Бариста","summary":"Оформленная инструкция по текстуре молока, двум этапам взбивания, температуре, вливанию и базовому латте-арту.","source":"Инструкция по взбиванию молока и латте-арту для бариста.pdf","blocks":[{"type":"lead","text":"Цель бариста — создать гладкую, глянцевую и однородную текстуру молока без крупных пузырей. Латте-арт начинается не с рисунка, а с правильной текстуры."},{"type":"steps","title":"Этап 1. Растяжение","items":["Кончик паровой трубки находится у поверхности молока.","Воздух добавляется мягко и контролируемо.","Громкое резкое шипение означает, что воздуха слишком много.","Если воздуха мало — молоко будет жидким; если много — сухим и пенным."]},{"type":"steps","title":"Этап 2. Закручивание","items":["После добавления воздуха трубку немного погружаем глубже.","Молоко должно вращаться в питчере как вихрь.","Вихрь разбивает пузырьки и делает текстуру однородной.","Готовая поверхность должна быть глянцевой."]},{"type":"callout","title":"Температура","text":"Ориентир — 55–60°C. Останавливать взбивание нужно, когда питчер горячий, но его еще можно удерживать рукой. Перегретое молоко теряет сладость и хуже подходит для латте-арта."},{"type":"cards","title":"Базовые рисунки","cards":[{"title":"Сердце","text":"Сформировать белое пятно у поверхности, дать ему вырасти, затем сделать ровный срез через центр."},{"title":"Тюльпан","text":"Последовательно положить 3–5 капель, слегка отодвигая питчер назад, затем сделать финальный срез."},{"title":"Розетта","text":"Требует стабильной текстуры и спокойного движения рукой. Сначала освоить сердце и тюльпан."}]},{"type":"table","title":"Типичные ошибки","headers":["Проблема","Что делать"],"rows":[["Крупные пузыри","Добавлять меньше воздуха, после взбивания прокрутить и простучать питчер."],["Молоко жидкое","Чуть дольше выполнить растяжение."],["Молоко сухое и пенное","Сократить растяжение, не держать трубку долго у поверхности."],["Нет глянца","Добиться стабильного вихря на этапе закручивания."],["Рисунок проваливается","Опустить питчер ближе к поверхности."],["Напиток потерял сладость","Не перегревать молоко."]]},{"type":"checklist","title":"Чек-лист бариста","items":["Питчер чистый, сухой и не переполнен.","Молоко холодное.","Паровая трубка чистая и продута до и после взбивания.","Воздух добавляется мягко.","Молоко вращается как вихрь.","Температура 55–60°C.","Молоко используется сразу после взбивания."]},{"type":"callout","title":"Итоговый стандарт","text":"Правильно взбитое молоко — гладкое, глянцевое, однородное, без крупных пузырей, сохраняет сладость и подходит для латте-арта."}]},{"id":"espresso-setup","section":"theory","category":"Бариста","title":"Инструкция по настройке эспрессо","duration":"25–30 минут","level":"Бариста / старший бариста","summary":"Оформленная инструкция по рабочему рецепту эспрессо, помолу, дозе, времени пролива и принятию решений по вкусу.","source":"Инструкция по настройке эспрессо для бариста.pdf","blocks":[{"type":"lead","text":"Цель настройки эспрессо — получить стабильный и сбалансированный напиток с правильной экстракцией, приятной плотностью, выраженной сладостью и чистым послевкусием. Цифры помогают попасть в рабочий диапазон, но окончательный критерий — вкус."},{"type":"cards","title":"Три способа настройки","cards":[{"title":"Помол","text":"Главный и самый быстрый инструмент. Мельче — пролив медленнее, крупнее — быстрее."},{"title":"Доза","text":"Рабочий диапазон 17–18 г. Больше доза — плотнее и медленнее, меньше — легче и быстрее."},{"title":"Время пролива","text":"Регулируется на кофемашине. Нужно, чтобы выход попадал в 34–36 г."}]},{"type":"callout","title":"Важно про автотемпер","text":"Автотемпер не является параметром настройки. Но после темперовки нужно проверять кофейную таблетку: она должна быть ровной, без трещин, перекосов и видимых повреждений."},{"type":"table","title":"Когда менять помол","headers":["Ситуация","Решение"],"rows":[["Пролив быстрее 28 секунд","Сделать помол мельче."],["Выход 34–36 г набирается слишком быстро","Сделать помол мельче."],["Вкус кислый, резкий, водянистый","Сделать помол мельче и проверить распределение."],["Пролив дольше 32–34 секунд","Сделать помол крупнее."],["Вкус горький, сухой, вяжущий","Сделать помол крупнее и проверить выход."]]},{"type":"table","title":"Краткая схема решений","headers":["Ситуация","Что делать"],"rows":[["Выход меньше 34 г","Увеличить время пролива на кофемашине."],["Выход больше 36 г","Сократить время пролива на кофемашине."],["Вкус кислый","Помол мельче, проверить распределение и таблетку."],["Вкус горький","Помол крупнее, уменьшить выход."],["Вкус водянистый","Помол мельче, проверить дозу и выход."],["Вкус сухой","Помол крупнее, сократить выход."],["Цифры хорошие, вкус плохой","Проверить распределение, таблетку и каналы."]]},{"type":"checklist","title":"Чек-лист настройки","items":["Кофемашина прогрета, группа и корзина чистые.","Портафильтр горячий и сухой.","Доза 17–18 г.","Выход 34–36 г.","Время пролива 28–32 секунды.","Кофе распределен равномерно.","После автотемпера таблетка ровная.","Эспрессо перемешан и обязательно попробован.","Настройка подтверждена повторным проливом."]},{"type":"callout","title":"Главное правило","text":"Вкус важнее идеального попадания в цифры. Если эспрессо вкусный и стабильно повторяется, небольшое отклонение по времени не всегда требует немедленной перенастройки."}]}],"checklists":[{"id":"opening-checklist","title":"Чек-лист открытия","description":"Задачи для подготовки бара и рабочего места к началу смены.","file":"assets/documents/checklist_open_close.xlsx","sourceFile":"Чек_Лист_Открытие_Закрытие.xlsx","requiresSubmit":true,"sections":[{"title":"Открытие смены","type":"tasks","rows":[{"task":"Быть на рабочем месте за 5 минут до начала смены, открыть смену в Айке."},{"task":"Вставить мусорные мешки."},{"task":"Включить бокаломойку, термопот, кофемашину, гриндер, ИзиМилк. Проверить исправность оборудования."},{"task":"Подготовить микрофибры на смену. 2-зеленые, 2-черные, 1-синяя."},{"task":"Заполнить холодильники (Вода, соки, молоко)"},{"task":"Проверить наличие заготовок на смену. (Холодильник, морозилка). Заполнить недостающие."},{"task":"Перебрать зелень, нарезать фрукты."},{"task":"Подготовить холодные чаи."},{"task":"Промыть холдеры и запчасти от кофемашины от моющего средства."},{"task":"Настроить эспрессо"},{"task":"Оповестить сотрудников зала о стоп листе. Проставить стоп лист в айке."},{"task":"Заполнить трубочки, заполнить зону с/с. (стаканы с/с, крышки с/с, бутылки с/с)"},{"task":"Переодеться в форму."},{"task":"Подготовить посуду: стекло - натереть, чашки - поставить на подогрев."}]}]},{"id":"closing-checklist","title":"Чек-лист закрытия","description":"Задачи для корректного завершения смены, уборки и подготовки бара к следующему дню.","file":"assets/documents/checklist_open_close.xlsx","sourceFile":"Чек_Лист_Открытие_Закрытие.xlsx","requiresSubmit":true,"sections":[{"title":"Закрытие смены","type":"tasks","rows":[{"task":"Расставить посуду на свои места."},{"task":"Протереть и убрать все заготовки в холодильники."},{"task":"Помыть и поставить на просушку оборудование бара."},{"task":"Замыть ИзиМилк и ринзер."},{"task":"Промыть стаканы от блендеров и поставить на просушку. Сами блендеры протереть."},{"task":"Замыть кофейные группы с помощью программы \"клиннинг\"."},{"task":"Разобрать холдеры и кофейные группы и залить их средством для кофемашин."},{"task":"Протереть все поверхности со спец средством."},{"task":"Слить бокаломойку и замыть запчасти."},{"task":"Все поставки разобраны и стоят на своих местах."},{"task":"Поставить весы на зарядку."},{"task":"Выключить всё оборудование."},{"task":"Мусор собран в мешки и выброшен в контейнеры. (Мешки надёжно завязаны!)"},{"task":"Проверить форму на чистоту, если есть есть пятна, забрать домой постирать."},{"task":"Написать в группу о списаниях и загоотвках сделанных за день, проверить акты приготовления"},{"task":"Отправить фотоотчет закрытия смены в чат."}]}]},{"id":"prep-checklist","title":"Заготовочный чек-лист","description":"Минимальные остатки заготовок и рабочих продуктов для контроля перед сменой.","file":"assets/documents/checklist_open_close.xlsx","sourceFile":"Чек_Лист_Открытие_Закрытие.xlsx","sections":[{"title":"Основной список","type":"minlist","rows":[{"task":"ПФ Фреш - Апельсин","min":"20 кг"},{"task":"ПФ Фреш - Грейпфрут","min":"15 кг"},{"task":"ПФ Суперджус - Лайм","min":"2кг"},{"task":"ПФ Раствор Кислот","min":"3кг"},{"task":"ПФ Сахарный Сироп","min":"3 кг"},{"task":"ПФ Пюре - Малина-Смородина","min":"10 кг"},{"task":"ПФ Пюре - Клубника","min":"10 кг"},{"task":"ПФ Пюре - Персик","min":"5 кг"},{"task":"ПФ Пюре Облепиха","min":"10 кг"},{"task":"ПФ Смузи Зеленый","min":"15 шт"},{"task":"ПФ Смузи Ягодный","min":"15 шт"},{"task":"ПФ Горячий Шоколад","min":"3кг"},{"task":"ПФ Матча","min":"0,5 кг"},{"task":"ПФ Айс-Ти Кения","min":"5 кг"},{"
